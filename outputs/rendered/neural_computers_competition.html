      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

            "session": {"cells": [{"code_hash": "4c2af4bfa882f7a85aeab8d558bc98ff", "console": [], "id": "setup", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "9d08a570a588deeb9e797234ef2e1a26", "console": [], "id": "Hbol", "outputs": [{"data": {"text/html": "\n    \u003Cstyle\u003E\n        :root {\n            --nc-ink: #0f172a;\n        }\n\n        .nc-wrap {\n            max-width: 1120px;\n            margin: 0 auto;\n            padding: 0 28px;\n        }\n\n        .nc-hero {\n            width: 100vw;\n            margin-left: calc(50% - 50vw);\n            margin-bottom: 2rem;\n            background:\n                radial-gradient(1100px 480px at 10% 0%, rgba(59,130,246,0.24), transparent 55%),\n                radial-gradient(900px 440px at 90% 0%, rgba(124,58,237,0.2), transparent 55%),\n                #0b1220;\n            color: #e2e8f0;\n            border-bottom: 1px solid rgba(148,163,184,0.25);\n        }\n\n        .nc-hero-grid {\n            display: grid;\n            grid-template-columns: 1.1fr 0.9fr;\n            gap: 2.4rem;\n            align-items: center;\n            padding: 68px 0 58px;\n        }\n\n        .nc-kicker {\n            display: inline-block;\n            letter-spacing: 0.07em;\n            text-transform: uppercase;\n            font-size: 0.75rem;\n            color: #93c5fd;\n            margin-bottom: 0.95rem;\n            font-weight: 700;\n        }\n\n        .nc-hero h1 {\n            color: #f8fafc;\n            font-size: clamp(2rem, 4vw, 3.35rem);\n            line-height: 1.06;\n            margin: 0 0 1rem;\n            letter-spacing: -0.025em;\n        }\n\n        .nc-hero p {\n            color: #cbd5e1;\n            font-size: 1.08rem;\n            line-height: 1.7;\n            max-width: 60ch;\n            margin: 0;\n        }\n\n        .nc-meta {\n            margin-top: 1.2rem;\n            color: #bfdbfe;\n            font-size: 0.95rem;\n        }\n\n        .nc-hero-shell {\n            border: 1px solid rgba(148, 163, 184, 0.3);\n            border-radius: 14px;\n            background: #0f172a;\n            color: #e2e8f0;\n            padding: 16px;\n            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;\n            line-height: 1.45;\n            font-size: 0.92rem;\n            box-shadow: 0 22px 52px rgba(2, 6, 23, 0.45);\n        }\n\n        .nc-shell {\n            border: 1px solid #1e293b;\n            border-radius: 14px;\n            background: #0f172a;\n            color: #e2e8f0;\n            padding: 14px;\n            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;\n            line-height: 1.24;\n            font-size: 0.86rem;\n            overflow-x: auto;\n        }\n\n        .nc-shell-title {\n            color: #93c5fd;\n            font-size: 0.72rem;\n            text-transform: uppercase;\n            letter-spacing: 0.08em;\n            margin-bottom: 10px;\n        }\n\n        @media (max-width: 920px) {\n            .nc-hero-grid {\n                grid-template-columns: 1fr;\n                padding: 56px 0 48px;\n            }\n\n            .nc-wrap {\n                padding: 0 20px;\n            }\n        }\n    \u003C/style\u003E\n    "}, "type": "data"}]}, {"code_hash": "27c96ce2db77d39275ea58cff7d6da48", "console": [], "id": "MJUe", "outputs": [{"data": {"text/html": "\n    \u003Csection class=\"nc-hero\"\u003E\n        \u003Cdiv class=\"nc-wrap nc-hero-grid\"\u003E\n            \u003Cdiv\u003E\n                \u003Cdiv class=\"nc-kicker\"\u003Etiny-neural-os \u00b7 marimo research notebook\u003C/div\u003E\n                \u003Ch1\u003ECan a model learn how a computer works from screen transitions alone?\u003C/h1\u003E\n                \u003Cp\u003E\n                    This notebook turns the core idea from \u003Cem\u003ENeural Computers\u003C/em\u003E (2026)\n                    into a compact, reproducible benchmark: predict the next terminal screen\n                    from the current one, then separate mechanical typing from command meaning.\n                \u003C/p\u003E\n                \u003Cdiv class=\"nc-meta\"\u003E\n                    Source paper:\n                    \u003Ca href=\"https://arxiv.org/abs/2604.06425\" style=\"color:#93c5fd; text-decoration:none; font-weight:600;\"\u003E\n                        Neural Computers (arXiv:2604.06425)\n                    \u003C/a\u003E\n                \u003C/div\u003E\n            \u003C/div\u003E\n            \u003Cpre class=\"nc-hero-shell\"\u003E$ whoami\nresearcher\n$ pwd\n/home/research\n$ python -c \"print(19*3)\"\n57\n$ \u2588\u003C/pre\u003E\n        \u003C/div\u003E\n    \u003C/section\u003E\n    "}, "type": "data"}]}, {"code_hash": "43edf55c64224ec08c2c14394cf900e7", "console": [], "id": "vblA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"what-this-notebook-does\"\u003EWhat this notebook does\u003C/h3\u003E\n\u003Cul\u003E\n\u003Cli\u003EBuilds intuition with a live toy terminal.\u003C/li\u003E\n\u003Cli\u003EUses \u003Cstrong\u003Esaved benchmark files\u003C/strong\u003E (no hand-entered demo numbers).\u003C/li\u003E\n\u003Cli\u003ECompares MLP, Transformer, and GRU under matched settings.\u003C/li\u003E\n\u003Cli\u003ESeparates easy mechanics (typing) from harder semantic updates (Enter).\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "8ef33a0069219ca85fc330877ec2b317", "console": [], "id": "bkHC", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"1-watch-the-toy-computer\"\u003E1) Watch the toy computer\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EUse this interactive toy terminal to see why the task is asymmetric: typing often changes a tiny local patch, while Enter can trigger larger, meaning-dependent updates.\u003C/spa
