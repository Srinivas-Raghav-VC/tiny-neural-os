      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

            "session": {"cells": [{"code_hash": "1d0db38904205bec4d6f6f6a1f6cec3e", "console": [], "id": "Hbol", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "62b953e0737f1761bc6562efcb26acf3", "console": [], "id": "MJUe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1 id=\"tiny-neural-os\"\u003E\ud83d\udda5\ufe0f Tiny Neural OS\u003C/h1\u003E\n\u003Cdiv style=\"background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: #e2e8f0; padding: 28px 32px; border-radius: 16px; margin: 20px 0;\"\u003E\n    \u003Cdiv style=\"font-size: 1.4rem; font-weight: 600; margin-bottom: 12px;\"\u003E\n        Can a neural network learn how a computer works just by watching the screen?\n    \u003C/div\u003E\n    \u003Cdiv style=\"color: #94a3b8; font-size: 1.05rem; line-height: 1.7;\"\u003E\n        This notebook implements the core idea from \u003Ca href=\"https://arxiv.org/abs/2604.06425\" style=\"color: #93c5fd;\"\u003ENeural Computers (2024)\u003C/a\u003E:\n        train a model to predict the next screen state from the current one, then measure whether it learns\n        \u003Cstrong style=\"color: #fbbf24;\"\u003Emechanical typing\u003C/strong\u003E (easy) versus \u003Cstrong style=\"color: #f87171;\"\u003Esemantic command execution\u003C/strong\u003E (hard).\n    \u003C/div\u003E\n\u003C/div\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "db99b1369d8766b01dbecad96daf4893", "console": [], "id": "vblA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"paper-tldr\"\u003E\ud83d\udcc4 Paper TLDR\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ENeural Computers\u003C/strong\u003E proposes training models on raw screen pixel/character transitions instead of\nstructured APIs. The key insight:\u003C/span\u003E\n\u003Ctable\u003E\n\u003Cthead\u003E\n\u003Ctr\u003E\n\u003Cth\u003EAspect\u003C/th\u003E\n\u003Cth\u003EDescription\u003C/th\u003E\n\u003C/tr\u003E\n\u003C/thead\u003E\n\u003Ctbody\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Cstrong\u003EInput\u003C/strong\u003E\u003C/td\u003E\n\u003Ctd\u003ECurrent screen state (terminal characters)\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Cstrong\u003EOutput\u003C/strong\u003E\u003C/td\u003E\n\u003Ctd\u003ENext screen state after one action\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Cstrong\u003EEasy regime\u003C/strong\u003E\u003C/td\u003E\n\u003Ctd\u003ETyping a character \u2192 local patch changes\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Cstrong\u003EHard regime\u003C/strong\u003E\u003C/td\u003E\n\u003Ctd\u003EPressing Enter \u2192 output depends on command \u003Cem\u003Emeaning\u003C/em\u003E\u003C/td\u003E\n\u003C/tr\u003E\n\u003C/tbody\u003E\n\u003C/table\u003E\n\u003Cspan class=\"paragraph\"\u003EThe paper argues this \"screen prediction\" task naturally separates mechanical understanding\n(cursor moves, characters appear) from semantic understanding (what does \u003Ccode\u003Epwd\u003C/code\u003E actually do?).\u003C/span\u003E\n\u003Chr /\u003E\n\u003Ch2 id=\"what-this-notebook-does\"\u003E\ud83d\udd2c What This Notebook Does\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EWe build a \u003Cstrong\u003Etoy version\u003C/strong\u003E of this idea:\u003C/span\u003E\n\u003Col\u003E\n\u003Cli\u003E\u003Cstrong\u003ESimulate a terminal\u003C/strong\u003E \u2014 generate episodes of typing commands and seeing output\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ETrain an MLP baseline\u003C/strong\u003E \u2014 predict each cell's next character from local context\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EMeasure the split\u003C/strong\u003E \u2014 compare accuracy on typing steps vs. Enter steps\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EBenchmark 3 architectures\u003C/strong\u003E \u2014 MLP, Transformer, GRU under matched conditions\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EVisualize everything\u003C/strong\u003E \u2014 interactive Altair charts showing where models succeed and fail\u003C/li\u003E\n\u003C/ol\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "0ec6639ce965281f93818e9b5e56123b", "console": [], "id": "bkHC", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Chr /\u003E\n\u003Ch1 id=\"1-the-toy-terminal\"\u003E1\ufe0f\u20e3 The Toy Terminal\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003EFirst, we need a terminal simulator. It maintains a \u003Cstrong\u003Escreen buffer\u003C/strong\u003E (2D array of characters)\nand processes \u003Cstrong\u003Eactions\u003C/strong\u003E (type a character, press backspace, press Enter).\u003C/span\u003E\n\u003Ch3 id=\"why-this-matters\"\u003EWhy this matters\u003C/h3\u003E\n\u003Cul\u003E\n\u003Cli\u003EEach action produces a screen transition: \u003Ccode\u003E(screen_before, action) \u2192 screen_after\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ETyping\u003C/strong\u003E changes 1-2 cells (the typed char + cursor move)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EEnter\u003C/strong\u003E can change many cells (command output, new prompt)\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EThis asymmetry is the core of the benchmark.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "53096f12cd4ff7bd56b55cd54b240683", "console": [], "id": "lEQa", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "d5b9df9419ab375b206214908011c8a8", "console": [], "id": "PKri", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "208ae567fe0d2446f5115ea2d45f59f7", "console": [], "id": "Xref", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"interactive-terminal-playground\"\u003E\ud83c\udfae Interactive Terminal Playground\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EUse the controls below to \u003Cstrong\u003Estep through\u003C/strong\u003E a terminal episode frame by frame.\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EYellow highlights\u003C/strong\u003E show cells that changed from the previous frame\u003C/li\u003E\n\u003Cli\u003ENotice how \u003Cstrong\u003Etyping\u003C/strong\u003E changes just 1-2 cells, but \u003Cstrong\u003EEnter\u003C/strong\u003E changes many\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "f7b03a10da060c5fca487b93341912ee", "console": [], "id": "SFPL", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "8ba5d0b4df8dede3e8706dcb78136658", "console": [], "id": "BYtC", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "b7f9446fbd47c8bc0d1a7161d401403b", "console": [], "id": "RGSE", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "f6a39d6a84889bda409f93239b5b0f5d", "console": [], "id": "Kclp", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: flex-end;flex-wrap: nowrap;gap: 1.5rem'\u003E\u003Cdiv style='flex: 1.5'\u003E\u003Cmarimo-ui-element object-id='SFPL-0' random-id='3d2d7cdc-a6f4-505b-697f-413ab28432a6'\u003E\u003Cmarimo-dropdown data-initial-value='[\u0026quot;whoami\u0026quot;]' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Command family\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-options='[\u0026quot;pwd\u0026quot;,\u0026quot;whoami\u0026quot;,\u0026quot;date\u0026quot;,\u0026quot;echo_home\u0026quot;,\u0026quot;python_arith\u0026quot;]' data-allow-select-none='false' data-searchable='false' data-f ents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;\u0026lt;strong\u0026gt;Step 0\u0026lt;/strong\u0026gt; is the initial screen. Use the slider to watch the terminal evolve.\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-kind='\u0026quot;info\u0026quot;'\u003E\u003C/marimo-callout-output\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "83920502454a715f1a2b381a6fb887e3", "console": [], "id": "Hstk", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Chr /\u003E\n\u003Ch1 id=\"2-the-prediction-task\"\u003E2\ufe0f\u20e3 The Prediction Task\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003ENow we define the actual ML task:\u003C/span\u003E\n\u003Cblockquote\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EGiven:\u003C/strong\u003E current screen + action being taken\n\u003Cstrong\u003EPredict:\u003C/strong\u003E next screen state\u003C/span\u003E\n\u003C/blockquote\u003E\n\u003Ch3 id=\"why-per-cell-prediction\"\u003EWhy per-cell prediction?\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EWe predict each cell independently using \u003Cstrong\u003Elocal features\u003C/strong\u003E:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003EA 3\u00d73 patch around the cell\u003C/li\u003E\n\u003Cli\u003EThe cell's (row, col) position\u003C/li\u003E\n\u003Cli\u003EThe action type and typed character\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EThis is a strong baseline because \u003Cstrong\u003Emost cells don't change\u003C/strong\u003E between frames,\nand those that do often follow local patterns (cursor moves right, character appears).\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThe challenge: when the user presses \u003Cstrong\u003EEnter\u003C/strong\u003E, the model needs \u003Cem\u003Eglobal\u003C/em\u003E understanding\nof the command to predict the output.\u003C/span\u003E\u003
