          var hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          var newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes

        });

            "session": {"cells": [{"code_hash": "970e39ccdbfbb5464c7cad6a8c7d7359", "console": [], "id": "Hbol", "outputs": [{"data": {"text/html": "<pre style='font-size: 12px'>ThemeRegistry.enable(&#x27;molab_readable&#x27;)</pre>"}, "type": "data"}]}, {"code_hash": "2a58726d1e74ac867ade623649298b1d", "console": [], "id": "MJUe", "outputs": [{"data": {"text/html": "<marimo-sidebar ><div style='display: flex;flex: 1;flex-direction: column;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'><div style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'><span class=\"markdown prose dark:prose-invert\"><h2 id=\"tiny-neural-os\"><iconify-icon icon='lucide:monitor' inline></iconify-icon> Tiny Neural OS</h2></span><marimo-nav-menu data-items='[{&quot;label&quot;: &quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;iconify-icon icon=&#x27;lucide:home&#x27; inline&gt;&lt;/iconify-icon&gt; Introduction&lt;/span&gt;&lt;/span&gt;&quot;, &quot;href&quot;: &quot;#intro&quot;, &quot;description&quot;: null}, {&quot;label&quot;: &quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;iconify-icon icon=&#x27;lucide:image&#x27; inline&gt;&lt;/iconify-icon&gt; Hero Gallery&lt;/span&gt;&lt;/span&gt;&quot;, &quot;href&quot;: &quot;#hero-gallery&quot;, &quot;description&quot;: null}, {&quot;label&quot;: &quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;iconify-icon icon=&#x27;lucide:terminal&#x27; inline&gt;&lt;/iconify-icon&gt; 1. Toy Terminal&lt;/span&gt;&lt;/span&gt;&quot;, &quot;href&quot;: &quot;#part-1&quot;, &quot;description&quot;: null}, {&quot;label&quot;: &quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;iconify-icon icon=&#x27;lucide:eye&#x27; inline&gt;&lt;/iconify-icon&gt; 2. Visualization&lt;/span&gt;&lt;/span&gt;&quot;, &quot;href&quot;: &quot;#part-2&quot;, &quot;description&quot;: null}, {&quot;label&quot;: &quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;iconify-icon icon=&#x27;lucide:database&#x27; inline&gt;&lt;/iconify-icon&gt; 3. Dataset&lt;/span&gt;&lt;/span&gt;&quot;, &quot;href&quot;: &quot;#part-3&quot;, &quot;description&quot;: null}, {&quot;label&quot;: &quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;iconify-icon icon=&#x27;lucide:brain&#x27; inline&gt;&lt;/iconify-icon&gt; 4. MLP Model&lt;/span&gt;&lt;/span&gt;&quot;, &quot;href&quot;: &quot;#part-4&quot;, &quot;description&quot;: null}, {&quot;label&quot;: &quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;iconify-icon icon=&#x27;lucide:bar-chart-2&#x27; inline&gt;&lt;/iconify-icon&gt; 5. Benchmark&lt;/span&gt;&lt;/span&gt;&quot;, &quot;href&quot;: &quot;#part-5&quot;, &quot;description&quot;: null}, {&quot;label&quot;: &quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;iconify-icon icon=&#x27;lucide:play-circle&#x27; inline&gt;&lt;/iconify-icon&gt; Live Gallery&lt;/span&gt;&lt;/span&gt;&quot;, &quot;href&quot;: &quot;#gallery&quot;, &quot;description&quot;: null}, {&quot;label&quot;: &quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;iconify-icon icon=&#x27;lucide:check-circle&#x27; inline&gt;&lt;/iconify-icon&gt; 6. Conclusions&lt;/span&gt;&lt;/span&gt;&quot;, &quot;href&quot;: &quot;#part-6&quot;, &quot;description&quot;: null}]' data-orientation='&quot;vertical&quot;'></marimo-nav-menu></div><div style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'><span class=\"markdown prose dark:prose-invert\"><hr /></span><span class=\"markdown prose dark:prose-invert\"><span class=\"paragraph\"><iconify-icon icon='lucide:file-text' inline></iconify-icon> <a href=\"https://arxiv.org/abs/2604.06425\" rel=\"noopener\" target=\"_blank\">arXiv:2604.06425</a></span></span><span class=\"markdown prose dark:prose-invert\"><span class=\"paragraph\"><iconify-icon icon='lucide:github' inline></iconify-icon> <a href=\"https://github.com/Srinivas-Raghav-VC/tiny-neural-os\" rel=\"noopener\" target=\"_blank\">tiny-neural-os</a></span></span></div></div></marimo-sidebar>"}, "type": "data"}]}, {"code_hash": "edc95eca92a50fa4d1f525c0bcc36fee", "console": [], "id": "vblA", "outputs": [{"data": {"text/html": "<span class=\"markdown prose dark:prose-invert\"><span class=\"paragraph\"><a id=\"intro\"></a></span>\n<h1 id=\"tiny-neural-os-learning-to-predict-terminal-screens\">Tiny Neural OS: Learning to Predict Terminal Screens</h1>\n<span class=\"paragraph\"><strong>The core question:</strong> Can a neural network learn how a computer works just by watching the screen change?</span>\n<span class=\"paragraph\">This notebook revisits the central idea from <strong>Neural Computers</strong> (<a href=\"https://arxiv.org/abs/2604.06425\" rel=\"noopener\" target=\"_blank\">arXiv:2604.06425</a>).\nThe paper proposes that a neural system can internalize computation, memory, and I/O by learning from interface traces alone \u2014 no explicit program state required.</span>\n<span class=\"paragraph\">Rather than reimplement the full paper, we isolate one essential primitive:</span>\n<blockquote>\n<span class=\"paragraph\"><strong>Given the current terminal screen and an action, predict what the screen looks like next.</strong></span>\n</blockquote>\n<span class=\"paragraph\">This simple task exposes the core tension:</span>\n<ul>\n<li><strong>Typing</strong> transitions are mechanical and local \u2014 the cursor moves, a character appears</li>\n<li><strong>Enter</strong> transitions are semantic \u2014 the model must know what the command <em>does</em></li>\n</ul>\n<hr />\n<h2 id=\"what-this-notebook-implements\">What this notebook implements</h2>\n<ol>\n<li>A <strong>toy terminal</strong> environment (10\u00d740 character grid)</li>\n<li>A <strong>next-screen prediction</strong> task from screen-action traces</li>\n<li>A clean split between <strong>easy</strong> transitions (typing) and <strong>hard</strong> transitions (Enter)</li>\n<li>A <strong>CPU-trainable MLP</strong> baseline that predicts cell updates from local context</li>\n<li>A <strong>benchmark comparison</strong> against Transformer and GRU baselines</li>\n</ol>\n<h2 id=\"why-this-matches-the-competition\">Why this matches the competition</h2>\n<span class=\"paragraph\">The competition asks for a notebook that brings a paper's core idea to life through code, UI elements, and explanatory text \u2014 not a full reimplementation.</span>\n<table>\n<thead>\n<tr>\n<th></th>\n<th></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>Paper's vision</strong></td>\n<td>A learned neural runtime for interactive computing</td>\n</tr>\n<tr>\n<td><strong>This notebook</strong></td>\n<td>A toy CLI that makes next-screen prediction legible</td>\n</tr>\n<tr>\n<td><strong>Our extension</strong></td>\n<td>Benchmark framing: typing vs. Enter, paraphrase generalization</td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<span class=\"paragraph\"><strong>Standalone note:</strong> Everything runs here \u2014 simulator, dataset builder, feature encoder, training loop, and interactive analysis \u2014 all in notebook cells. External scripts are optional.</span>\n</blockquote></span>"}, "type": "data"}]}, {"code_hash": "cafe79c49a1b3a020f269ae9db66c513", "console": [], "id": "bkHC", "outputs": [{"data": {"text/html": "<marimo-callout-output data-html='&quot;&lt;div style=&#x27;display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem&#x27;&gt;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;h3 id=&#92;&quot;30-second-summary-for-the-busy-reader&#92;&quot;&gt;&lt;iconify-icon icon=&#x27;lucide:zap&#x27; inline&gt;&lt;/iconify-icon&gt; 30-second summary (for the busy reader)&lt;/h3&gt;&lt;/span&gt;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;strong&gt;Question.&lt;/strong&gt; Given only &lt;code&gt;(screen, action) &#92;u2192 next screen&lt;/code&gt; traces from a toy CLI, can a neural network learn the terminal&#x27;s behaviour &#92;u2014 both &lt;em&gt;local&lt;/em&gt; edits (typing) and &lt;em&gt;semantic&lt;/em&gt; ones (Enter runs a command and produces output)?&lt;/span&gt;&#92;n&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;strong&gt;Finding.&lt;/strong&gt; Typing is easy &lt;em&gt;when the model knows the exact character&lt;/em&gt; &#92;u2014 a tiny per-cell MLP hits &lt;strong&gt;99.8%&lt;/strong&gt; changed-cell accuracy on typing in the command-conditioned setting. Enter is the hard case and the real benchmark: &lt;strong&gt;MLP &#92;u2248 75%&lt;/strong&gt; mean changed-cell accuracy across all four settings, &lt;strong&gt;Transformer &#92;u2248 82%&lt;/strong&gt; on Enter alone when given the family, &lt;strong&gt;GRU &#92;u2248 20%&lt;/strong&gt; &#92;u2014 near the copy-the-previous-frame baseline. All numbers come from &lt;code&gt;experiments/toy_nc_cli/results/baseline_comparison.csv&lt;/code&gt;.&lt;/span&gt;&#92;n&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;strong&gt;The twist.&lt;/strong&gt; The interesting split isn&#x27;t MLP vs Transformer &#92;u2014 it&#x27;s &lt;strong&gt;changed cells vs all cells&lt;/strong&gt;. Most of a 10&#92;u00d740 screen doesn&#x27;t change step-to-step, so overall accuracy trivially &amp;gt; 96% for everything, including the GRU. Every chart in this notebook evaluates only on &lt;em&gt;cells that actually changed&lt;/em&gt;, which is why the numbers look smaller &#92;u2014 and why they actually mean something.&lt;/span&gt;&#92;n&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;strong&gt;Presentation (molab).&lt;/strong&gt; Implementation cells use &lt;code&gt;hide_code=True&lt;/code&gt; so the default view is interactive UI and figures, not long Python blocks. Altair charts use &lt;strong&gt;larger axis labels&lt;/strong&gt;, &lt;strong&gt;stronger gridlines&lt;/strong&gt;, and &lt;strong&gt;framed plot areas&lt;/strong&gt; so metrics read clearly on a laptop screen.&lt;/span&gt;&lt;/span&gt;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;strong&gt;Where to look next:&lt;/strong&gt; Hero Gallery (immediately below) for visual proof &#92;u00b7 &lt;a href=&#92;&quot;#part-5&#92;&quot;&gt;Part 5 Benchmark&lt;/a&gt; for the numbers &#92;u00b7 &lt;a href=&#92;&quot;#part-4&#92;&quot;&gt;Analysis &#92;u2192 Evolution&lt;/a&gt; to watch the MLP learn &#92;u00b7 &lt;a href=&#92;&quot;#part-4&#92;&quot;&gt;Analysis &#92;u2192 Anatomy&lt;/a&gt; to see one prediction decomposed &#92;u00b7 &lt;a href=&#92;&quot;#gallery&#92;&quot;&gt;Live Gallery&lt;/a&gt; to re-run this on the model you just trained.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&quot;' data-kind='&quot;success&quot;'></marimo-callout-output>"}, "type": "data"}]}, {"code_hash": "953672ba34b4a8598323ee87639695f4", "console": [], "id": "lEQa", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "4c06638ba525e05bee0a39207d62ca12", "console": [], "id": "PKri", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "e7aa7ea7ec61ef006313566d1fa327ec", "console": [], "id": "Xref", "outputs": [{"data": {"text/html": "<div style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'><span class=\"markdown prose dark:prose-invert\"><hr />\n<span class=\"paragraph\"><a id=\"hero-gallery\"></a></span>\n<h3 id=\"hero-gallery-the-trained-model-running-on-every-command-family\"><iconify-icon icon='lucide:image' inline></iconify-icon> Hero Gallery \u2014 the trained model, running on every command family</h3>\n<span class=\"paragraph\">Before the theory, a tangible demonstration. Below is the MLP from Part 4, trained with default\nsettings, running <strong>autoregressively</strong> on one canonical variant per command family \u2014 feeding its\nown predictions back as input, step after step. Each tab shows the <strong>true final screen</strong> next to\nthe <strong>model's prediction</strong>, with wrong cells highlighted in red and cells that changed during the\nepisode highlighted in yellow on the true side.</span>\n<span class=\"paragraph\">This is the visceral version of the benchmark table: you can <em>see</em> what \"75% mean changed-cell\naccuracy\" actually looks like \u2014 sometimes <code>date +%Y \u2192 2026</code> is near-perfect, sometimes the\nautoregressive rollout compounds errors into a recognisable-but-garbled <code>rese\u00b7\u00b7eer</code>. Both are\ninformative.</span></span><div style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 1rem'><div style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'><div style='flex: 1'><marimo-stat data-value='&quot;2 / 5&quot;' data-label='&quot;Verbatim output&quot;' data-caption='&quot;expected string appears exactly in the AR rollout&quot;' data-bordered='false'></marimo-stat></div><div style='flex: 1'><marimo-stat data-value='&quot;3 / 5&quot;' data-label='&quot;Recognisable output&quot;' data-caption='&quot;clear prefix o lite/v5.20.1.json&quot;}' data-chart-selection='false' data-field-selection='true'></marimo-vega></marimo-ui-element></div></div></marimo-tabs></marimo-ui-element><span class=\"markdown prose dark:prose-invert\"><blockquote>\n<span class=\"paragraph\"><strong>Provenance &amp; reproducibility.</strong> Predictions above come from a deterministic training run: default MLP (128 hidden units, 25 epochs, <code>partial_fit</code>, conditioning=<code>full</code>, <code>neg_ratio</code>=8, lr=0.002, seed=42). Final training loss: <strong>0.0398</strong>. Regenerate anytime with <code>python scripts/generate_gallery_cache.py</code>. The default tab (date) is the highest-accuracy family \u2014 the red dashed line in each sparkline marks the Enter step where the command executes.</span>\n</blockquote></span></div></div>"}, "type": "data"}]}, {"code_hash": "fe36ed34f9895ff91760513c7a3b0d16", "console": [], "id": "SFPL", "outputs": [{"data": {"text/html": "<span class=\"markdown prose dark:prose-invert\"><hr />\n<h3 id=\"the-paper-in-plain-english\"><iconify-icon icon='lucide:book-open' inline></iconify-icon> The paper, in plain English</h3>\n<span class=\"paragraph\"><strong>Neural Computers</strong> (<a href=\"https://arxiv.org/abs/2604.06425\" rel=\"noopener\" target=\"_blank\">arXiv:2604.06425</a> \u00b7 <a href=\"https://www.alphaxiv.org/abs/2604.06425\" rel=\"noopener\" target=\"_blank\">alphaXiv</a>) asks one big question:</span>\n<blockquote>\n<span class=\"paragraph\"><strong>Can a neural network learn how a computer works, just by watching it?</strong></span>\n</blockquote>\n<span class=\"paragraph\">The full paper argues that a neural system can internalize computation, memory, and I/O\nby watching interface traces \u2014 someone typing, the terminal rendering, commands executing \u2014\n<em>without ever being told the underlying program logic</em>. If true, that's wild: you could\n\"grow\" an operating system the way you'd grow a language model, by feeding it experience.</span>\n<span class=\"paragraph\">That's ambitious. Before we try to reproduce a full neural OS, it's worth asking whether the\n<strong>single primitive</strong> underneath works at all. So this notebook isolates one sub-question:</span>\n<blockquote>\n<span class=\"paragraph\"><strong>Given the current terminal screen and an action, can we predict the next screen?</strong></span>\n</blockquote></span>"}, "type": "data"}]}, {"code_hash": "de2010e7fc5b3002c9272fccf2d49718", "console": [], "id": "BYtC", "outputs": [{"data": {"text/html": "<div style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 1rem'><div style='flex: 1'><marimo-callout-output data-html='&quot;&lt;div style=&#x27;display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem&#x27;&gt;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;h4 id=&#92;&quot;what-the-model-sees&#92;&quot;&gt;&lt;iconify-icon icon=&#x27;lucide:eye&#x27; inline&gt;&lt;/iconify-icon&gt; What the model sees&lt;/h4&gt;&lt;/span&gt;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Nothing but &lt;strong&gt;pairs of screens&lt;/strong&gt;:&lt;/span&gt;&#92;n&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;code&gt;(current screen, action) &#92;u2192 next screen&lt;/code&gt;.&lt;/span&gt;&#92;n&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;No source code. No labels. No explanations. Just pixels and keypresses &#92;u2014 the same information a human watching over someone&#x27;s shoulder would have.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&quot;' data-kind='&quot;info&quot;'></marimo-callout-output></div><div style='flex: 1'><marimo-callout-output data-html='&quot;&lt;div style=&#x27;display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem&#x27;&gt;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;h4 id=&#92;&quot;the-core-bet&#92;&quot;&gt;&lt;iconify-icon icon=&#x27;lucide:lightbulb&#x27; inline&gt;&lt;/iconify-icon&gt; The core bet&lt;/h4&gt;&lt;/span&gt;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;If we show a capable enough network enough transitions, it will &lt;strong&gt;discover the rules of the terminal implicitly&lt;/strong&gt; &#92;u2014 that typing inserts characters, that Enter runs a command, that &lt;code&gt;whoami&lt;/code&gt; prints &lt;code&gt;researcher&lt;/code&gt;, and so on.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&quot;' data-kind='&quot;warn&quot;'></marimo-callout-output></div><div style='flex: 1'><marimo-callout-output data-html='&quot;&lt;div style=&#x27;display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem&#x27;&gt;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;h4 id=&#92;&quot;our-toy-test&#92;&quot;&gt;&lt;iconify-icon icon=&#x27;lucide:target&#x27; inline&gt;&lt;/iconify-icon&gt; Our toy test&lt;/h4&gt;&lt;/span&gt;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;We settle for a much smaller, much sharper win:&lt;/span&gt;&#92;n&lt;ul&gt;&#92;n&lt;li&gt;&lt;strong&gt;Can the model type?&lt;/strong&gt; (the easy/local part)&lt;/li&gt;&#92;n&lt;li&gt;&lt;strong&gt;Can it produce the right output after Enter?&lt;/strong&gt; (the hard/semantic part)&lt;/li&gt;&#92;n&lt;/ul&gt;&#92;n&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;If yes to both, the paper&#x27;s core claim survives at this scale.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&quot;' data-kind='&quot;success&quot;'></marimo-callout-output></div></div>"}, "type": "data"}]}, {"code_hash": "768d91d1fca1ec2275270936f8bf55a3", "console": [], "id": "RGSE", "outputs": [{"data": {"text/html": "<div style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'><div style='flex: 1'><marimo-stat data-value='&quot;10 &#92;u00d7 40&quot;' data-label='&quot;Screen size&quot;' data-caption='&quot;400 character cells&quot;' data-bordered='false'></marimo-stat></div><div style='flex: 1'><marimo-stat data-value='&quot;97&quot;' data-label='&quot;Vocabulary&quot;' data-caption='&quot;ASCII + cursor + blank&quot;' data-bordered='false'></marimo-stat></div><div style='flex: 1'><marimo-stat data-value='&quot;5&quot;' data-label='&quot;Command families&quot;' data-caption='&quot;pwd &#92;u00b7 whoami &#92;u00b7 date &#92;u00b7 echo &#92;u00b7 python&quot;' data-bordered='false'></marimo-stat></div><div style='flex: 1'><marimo-stat data-value='&quot;981&quot;' data-label='&quot;Feature vector&quot;' data-caption='&quot;patch + position + conditioning&quot;' data-bordered='false'></marimo-stat></div><div style='flex: 1'><marimo-stat data-value='&quot;128&quot;' data-label='&quot;Hidden layer&quot;' data-caption='&quot;ReLU units in the MLP&quot;' data-bordered='false'></marimo-stat></div></div>"}, "type": "data"}]}, {"code_hash": "d35ec949239cd477f8cc98887670415f", "console": [], "id": "Kclp", "outputs": [{"data": {"text/html": "<marimo-accordion data-labels='[&quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;iconify-icon icon=&#x27;lucide:workflow&#x27; inline&gt;&lt;/iconify-icon&gt; View the full prediction pipeline (input &#92;u2192 features &#92;u2192 MLP &#92;u2192 next screen)&lt;/span&gt;&lt;/span&gt;&quot;]' data-multiple='false'><div><marimo-mermaid data-diagram='&quot;&#92;nflowchart LR&#92;n    A[&#92;&quot;Terminal screen&lt;br&gt;(10&#92;u00d740 chars)&#92;&quot;] --&gt; B[&#92;&quot;Action&lt;br&gt;(type / backspace / enter)&#92;&quot;]&#92;n    A --&gt; P[&#92;&quot;3&#92;u00d73 patch&lt;br&gt;873 dims&#92;&quot;]&#92;n    A --&gt; Q[&#92;&quot;Normalised (row, col)&lt;br&gt;2 dims&#92;&quot;]&#92;n    B --&gt; R[&#92;&quot;Action type&lt;br&gt;4 dims&#92;&quot;]&#92;n    B --&gt; S[&#92;&quot;Command family&lt;br&gt;5 dims&#92;&quot;]&#92;n    B --&gt; T[&#92;&quot;Typed character&lt;br&gt;97 dims&#92;&quot;]&#92;n    P --&gt; V[&#92;&quot;Feature vector&lt;br&gt;up to 981 dims&#92;&quot;]&#92;n    Q --&gt; V&#92;n    R --&gt; V&#92;n    S --&gt; V&#92;n    T --&gt; V&#92;n    V --&gt; H[&#92;&quot;Hidden layer&lt;br&gt;128 ReLU units&#92;&quot;]&#92;n    H --&gt; O[&#92;&quot;Softmax&lt;br&gt;over 97 chars&#92;&quot;]&#92;n    O --&gt; N[&#92;&quot;Predicted next-cell character&#92;&quot;]&#92;n    N --&gt; NS[&#92;&quot;Apply to 10&#92;u00d740 grid&lt;br&gt;&#92;u2192 next screen&#92;&quot;]&#92;n&#92;n    classDef input fill:#e0f2fe,stroke:#0284c7,stroke-width:1px;&#92;n    classDef feat fill:#fef3c7,stroke:#d97706,stroke-width:1px;&#92;n    classDef model fill:#ede9fe,stroke:#7c3aed,stroke-width:1px;&#92;n    classDef out fill:#dcfce7,stroke:#16a34a,stroke-width:1px;&#92;n    class A,B input;&#92;n    class P,Q,R,S,T,V feat;&#92;n    class H,O model;&#92;n    class N,NS out;&#92;n&quot;'></marimo-mermaid></div></marimo-accordion>"}, "type": "data"}]}, {"code_hash": "e7d070e6c3cc6391799d4c9efa547246", "console": [], "id": "emfo", "outputs": [{"data": {"text/html": "<marimo-accordion data-labels='[&quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;iconify-icon icon=&#x27;lucide:function-square&#x27; inline&gt;&lt;/iconify-icon&gt; Problem, formalized  (math &#92;u2014 optional)&lt;/span&gt;&lt;/span&gt;&quot;]' data-multiple='false'><div><div style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.75rem'><span class=\"markdown prose dark:prose-invert\"><span class=\"paragraph\"><strong>State and action spaces.</strong> Let <marimo-tex class=\"arithmatex\">||(\\mathcal{V}||)</marimo-tex> be the vocabulary of <marimo-tex class=\"arithmatex\">||(|\\mathcal{V}| = 97||)</marimo-tex> symbols\n(95 printable ASCII + cursor + blank). A terminal screen is a matrix</span>\n<marimo-tex class=\"arithmatex\">||[s \\in \\mathcal{V}^{10 \\times 40}, \\qquad s^{(r,c)} \\text{ is the character at row } r, \\text{ column } c.||]</marimo-tex><span class=\"paragraph\">An action is <marimo-tex class=\"arithmatex\">||(a = (\\text{kind}, \\text{family}, \\text{char})||)</marimo-tex> with kind in\n<marimo-tex class=\"arithmatex\">||(\\{\\text{idle}, \\text{type}, \\text{backspace}, \\text{enter}\\}||)</marimo-tex>.</span>\n<span class=\"paragraph\"><strong>True dynamics.</strong> The toy terminal is deterministic: there exists a map\n<marimo-tex class=\"arithmatex\">||(T : \\mathcal{V}^{10\\times 40} \\times \\mathcal{A} \\to \\mathcal{V}^{10\\times 40}||)</marimo-tex> such that\n<marimo-tex class=\"arithmatex\">||(s_{t+1} = T(s_t, a_t)||)</marimo-tex>. The paper's question is whether we can learn <marimo-tex class=\"arithmatex\">||(T||)</marimo-tex> from traces alone.</span>\n<span class=\"paragraph\"><strong>Per-cell factorization.</strong> Modelling <marimo-tex class=\"arithmatex\">||(s_{t+1}||)</marimo-tex> jointly is a distribution over\n<marimo-tex class=\"arithmatex\">||(97^{400}||)</marimo-tex> possible screens \u2014 intractable. Instead we factor cell-wise:</span>\n<marimo-tex class=\"arithmatex\">||[s_{t+1}^{(r,c)} \\;\\approx\\; f_\\theta\\!\\left(\\phi(s_t,\\, r,\\, c,\\, a_t)\\right)||]</marimo-tex><span class=\"paragraph\">where <marimo-tex class=\"arithmatex\">||(\\phi||)</marimo-tex> is a hand-designed feature encoder and <marimo-tex class=\"arithmatex\">||(f_\\theta||)</marimo-tex> a small neural classifier.\nThis turns one <marimo-tex class=\"arithmatex\">||(97^{400}||)</marimo-tex>-way problem into <marimo-tex class=\"arithmatex\">||(400||)</marimo-tex> independent <marimo-tex class=\"arithmatex\">||(97||)</marimo-tex>-way classifications\nthat share parameters.</span>\n<span class=\"paragraph\"><strong>Feature encoder.</strong> <marimo-tex class=\"arithmatex\">||(\\phi||)</marimo-tex> concatenates five blocks:</span>\n<marimo-tex class=\"arithmatex\">||[\n\\phi(s, r, c, a) \\;=\\;\n\\underbrace{\\mathrm{patch}_{3\\times 3}(s, r, c)}_{873}\n\\;\\oplus\\; \\underbrace{(r/9,\\; c/39)}_{2}\n\\;\\oplus\\; \\underbrace{\\mathrm{onehot}(\\text{kind})}_{4}\n\\;\\oplus\\; \\underbrace{\\mathrm{onehot}(\\text{family})}_{5}\n\\;\\oplus\\; \\underbrace{\\mathrm{onehot}(\\text{char})}_{97}\n||]</marimo-tex><span class=\"paragraph\">with ablation settings that drop the last three blocks:\n<marimo-tex class=\"arithmatex\">||(d \\in \\{875, 884, 981\\}||)</marimo-tex> for conditioning levels <code>none</code>, <code>family</code>, and <code>full</code>.</span>\n<span class=\"paragraph\"><strong>Classifier.</strong> <marimo-tex class=\"arithmatex\">||(f_\\theta : \\mathbb{R}^d \\to \\Delta^{96}||)</marimo-tex> is a one-hidden-layer MLP</span>\n<marimo-tex class=\"arithmatex\">||[h = \\mathrm{ReLU}(W_1 \\phi + b_1), \\qquad f_\\theta(\\phi) = \\mathrm{softmax}(W_2 h + b_2)||]</marimo-tex><span class=\"paragraph\">with <marimo-tex class=\"arithmatex\">||(W_1 \\in \\mathbb{R}^{128\\times d}||)</marimo-tex> and <marimo-tex class=\"arithmatex\">||(W_2 \\in \\mathbb{R}^{97\\times 128}||)</marimo-tex>.</span></span><marimo-callout-output data-html='&quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;strong&gt;In plain English.&lt;/strong&gt; The screen is a grid of letters. A keypress is a tiny event. A true terminal is a &lt;em&gt;function&lt;/em&gt; from (screen, keypress) to (next screen). We don&#x27;t have that function, so we try to &lt;em&gt;learn it&lt;/em&gt; &#92;u2014 but instead of predicting 400 letters at once, we teach a small network to predict one letter at a time, given what&#x27;s around it and what key was pressed.&lt;/span&gt;&lt;/span&gt;&quot;' data-kind='&quot;info&quot;'></marimo-callout-output></div></div></marimo-accordion>"}, "type": "data"}]}, {"code_hash": "535e0c5bd3687344c519b7d98db2886e", "console": [], "id": "Hstk", "outputs": [{"data": {"text/html": "<span class=\"markdown prose dark:prose-invert\"><hr />\n<span class=\"paragraph\"><a id=\"part-1\"></a></span>\n<h1 id=\"part-1-building-a-toy-terminal\"><iconify-icon icon='lucide:terminal' inline></iconify-icon> Part 1: Building a Toy Terminal</h1>\n<span class=\"paragraph\">We need training data. Our terminal simulator:</span>\n<ol>\n<li>Maintains a <strong>screen buffer</strong> \u2014 a 10\u00d740 grid of characters</li>\n<li>Processes <strong>actions</strong> \u2014 typing, backspace, Enter</li>\n<li>Produces <strong>screen transitions</strong> \u2014 (before, after) pairs for each action</li>\n</ol>\n<blockquote>\n<span class=\"paragraph\"><em>In plain English.</em> Think of this as a <strong>movie of a terminal</strong> stored as frames. Every time\nthe user presses a key, we save one frame, apply the keypress, and save the next frame.\nThe neural network's only job is to learn the rule <code>frame_{t+1} = f(frame_t, action_t)</code> \u2014\nthe same rule the paper wants a bigger network to learn about real computers.</span>\n</blockquote></span>"}, "type": "data"}]}, {"code_hash": "2d8ee88c844edfc83279ece2edacdd62", "console": [], "id": "nWHF", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "caf93b831773822a9b0e80d0467c0779", "console": [], "id": "iLit", "outputs": [{"data": {"text/html": "<span class=\"markdown prose dark:prose-invert\"><h3 id=\"the-command-library\">The Command Library</h3>\n<span class=\"paragraph\">Each command belongs to a <strong>family</strong> with multiple <strong>phrasings</strong> that produce the same output:</span>\n<table>\n<thead>\n<tr>\n<th>Family</th>\n<th>Phrasings</th>\n<th>Output</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>pwd</code></td>\n<td><code>pwd</code>, <code>echo $PWD</code>, <code>printenv PWD</code></td>\n<td><code>/home/researcher</code></td>\n</tr>\n<tr>\n<td><code>whoami</code></td>\n<td><code>whoami</code>, <code>echo $USER</code>, <code>id -un</code></td>\n<td><code>researcher</code></td>\n</tr>\n</tbody>\n</table>\n<span class=\"paragraph\">This lets us test <strong>generalization</strong>: does the model understand command semantics, or just memorize character sequences?</span></span>"}, "type": "data"}]}, {"code_hash": "e22808f9f7067986ae8aa87d8d702631", "console": [], "id": "ZHCJ", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "be56134f817cae9b8d4357abb562ad46", "console": [], "id": "ROlb", "outputs": [{"data": {"text/html": "<div style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'><div style='flex: 1'><marimo-stat data-value='&quot;97&quot;' data-label='&quot;Vocabulary size&quot;' data-caption='&quot;printable chars + cursor + pad&quot;' data-bordered='false'></marimo-stat></div><div style='flex: 1'><marimo-stat data-value='&quot;5&quot;' data-label='&quot;Command families&quot;' data-caption='&quot;pwd, whoami, date, echo_home, python_arith&quot;' data-bordered='false'></marimo-stat></div><div style='flex: 1'><marimo-stat data-value='&quot;12&quot;' data-label='&quot;Command phrasings&quot;' data-caption='&quot;used for variation and paraphrase tests&quot;' data-bordered='false'></marimo-stat></div></div>"}, "type": "data"}]}, {"code_hash": "2a4d1d8f0c37f09cd1b47f97b50dec56", "console": [], "id": "qnkX", "outputs": [{"data": {"text/html": "<div style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 2rem'><div style='flex: 1'><div style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'><span class=\"markdown prose dark:prose-invert\"><h3 id=\"data-structures\">Data Structures</h3></span><span class=\"markdown prose dark:prose-invert\"><table>\n<thead>\n<tr>\n<th>Structure</th>\n<th>Purpose</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>TerminalConfig</code></td>\n<td>Terminal dimensions (rows, columns)</td>\n</tr>\n<tr>\n<td><code>Action</code></td>\n<td>A single user action (type char, Enter, backspace)</td>\n</tr>\n<tr>\n<td><code>Episode</code></td>\n<td>A complete command sequence: type \u2192 Enter \u2192 output</td>\n</tr>\n</tbody>\n</table></span></div></div><div style='flex: 1'><div style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'><span class=\"markdown prose dark:prose-invert\"><h3 id=\"example-episode\">Example Episode</h3></span><marimo-json-output data-json-data='{&quot;Episode&quot;: {&quot;family&quot;: &quot;&#x27;pwd&#x27; | &#x27;whoami&#x27; | &#x27;date&#x27; | ...&quot;, &quot;command_text&quot;: &quot;&#x27;echo &#36;PWD&#x27;&quot;, &quot;frames&quot;: [&quot;screen_0&quot;, &quot;screen_1&quot;, &quot;...&quot;, &quot;screen_n&quot;], &quot;actions&quot;: [{&quot;kind&quot;: &quot;type_char&quot;, &quot;typed_char&quot;: &quot;&#x27;e&#x27;&quot;}, {&quot;kind&quot;: &quot;type_char&quot;, &quot;typed_char&quot;: &quot;&#x27;c&#x27;&quot;}, &quot;...&quot;, {&quot;kind&quot;: &quot;enter&quot;}]}}' data-value-types='&quot;python&quot;'></marimo-json-output></div></div></div>"}, "type": "data"}]}, {"code_hash": "d3dcf787e848374688f382a306ecdba3", "console": [], "id": "TqIu", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "8aba87ad762136acc3ed9fb2535bcdb1", "console": [], "id": "Vxnm", "outputs": [{"data": {"text/html": "<span class=\"markdown prose dark:prose-invert\"><h3 id=\"the-episode-generator\">The Episode Generator</h3>\n<span class=\"paragraph\">For each episode:</span>\n<ol>\n<li>Start with a blank screen: <code>$ \u2588</code></li>\n<li>Simulate typing each character of the command</li>\n<li>Simulate pressing Enter to execute</li>\n</ol>\n<span class=\"paragraph\">Each step produces one screen transition \u2014 our training data.</span></span>"}, "type": "data"}]}, {"code_hash": "66fefb7d814619de389d55d82dfe0df3", "console": [], "id": "DnEU", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "b2b40ce0e304e35cdc55b4bd700ff2cc", "console": [], "id": "ulZA", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "c74051dc521c28e9ba7ee8087b4028a3", "console": [], "id": "ecfG", "outputs": [{"data": {"text/html": "<span class=\"markdown prose dark:prose-invert\"><hr />\n<span class=\"paragraph\"><a id=\"part-2\"></a></span>\n<h1 id=\"part-2-visualizing-the-terminal\"><iconify-icon icon='lucide:eye' inline></iconify-icon> Part 2: Visualizing the Terminal</h1>\n<span class=\"paragraph\">Step through an episode frame by frame. Watch for:</span>\n<ul>\n<li><strong>Yellow cells</strong> = what changed from the previous frame</li>\n<li><strong>Typing</strong> = 2 cells change (new char + cursor move)</li>\n<li><strong>Enter</strong> = roughly 5\u201320 cells change (cursor clear + output line + new prompt)</li>\n</ul></span>"}, "type": "data"}]}, {"code_hash": "c75fc43c12f40a2f2ef33f18805f7121", "console": [], "id": "Pvdt", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "33d1dd37bb6b0a97a60204085693209d", "console": [], "id": "ZBYS", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "10b6d05a8fb827b482404bb0a053e443", "console": [], "id": "aLJB", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "5934831025db4fb0bbe1635a35ca8b80", "console": [], "id": "nHfw", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "d1687a5b9ce299d2d571a27149eb983f", "console": [], "id": "xXTn", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "41b6165c00175fc4dfe0c0eec59e5831", "console": [], "id": "AjVT", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "6c3c955f35b044b9ada9d360ce27e47f", "console": [], "id": "pHFh", "outputs": [{"data": {"text/html": "<span class=\"markdown prose dark:prose-invert\"><h3 id=\"the-key-insight-typing-vs-enter\">The Key Insight: Typing vs. Enter</h3>\n<table>\n<thead>\n<tr>\n<th>Action</th>\n<th>Cells changed</th>\n<th>What the model needs</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Typing</td>\n<td>2</td>\n<td>Local rule: cursor cell \u2192 char, next cell \u2192 cursor</td>\n</tr>\n<tr>\n<td>Enter</td>\n<td>5\u201320 (varies with output length)</td>\n<td>Semantic knowledge: what does this command output?</td>\n</tr>\n</tbody>\n</table>\n<span class=\"paragraph\">This is why we <strong>evaluate them separately</strong> \u2014 a model could hit 95% overall by acing typing while completely failing Enter.</span></span>"}, "type": "data"}]}, {"code_hash": "8b7bd3b9a7dab3a16a1967fc809d65ca", "console": [], "id": "NCOB", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "daee12b22bc48ed392f47079930576e6", "console": [], "id": "aqbW", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "fbdfdec7172770c56b77be5edae67660", "console": [], "id": "TRpd", "outputs": [{"data": {"text/html": "<span class=\"markdown prose dark:prose-invert\"><hr />\n<span class=\"paragraph\"><a id=\"part-3\"></a></span>\n<h1 id=\"part-3-building-the-training-dataset\"><iconify-icon icon='lucide:database' inline></iconify-icon> Part 3: Building the Training Dataset</h1>\n<span class=\"paragraph\"><strong>The prediction task:</strong> For each cell, predict the character after the action.</span>\n<ul>\n<li><strong>Input (X):</strong> Current screen, cell position, action info</li>\n<li><strong>Output (y):</strong> Next character (class index 0\u201396)</li>\n</ul>\n<h3 id=\"features-per-cell\">Features per cell</h3>\n<table>\n<thead>\n<tr>\n<th>Feature</th>\n<th>Dimensions</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Local 3\u00d73 patch</td>\n<td>873</td>\n<td>One-hot encoding of 9 neighbors</td>\n</tr>\n<tr>\n<td>Position</td>\n<td>2</td>\n<td>Normalized (row, col)</td>\n</tr>\n<tr>\n<td>Action type</td>\n<td>4</td>\n<td>One-hot: idle, type, backspace, enter</td>\n</tr>\n<tr>\n<td>Command family</td>\n<td>5</td>\n<td>One-hot: pwd, whoami, date, ...</td>\n</tr>\n<tr>\n<td>Typed character</td>\n<td>97</td>\n<td>One-hot: which char was typed</td>\n</tr>\n</tbody>\n</table>\n<span class=\"paragraph\">The last three are <strong>conditioning features</strong> \u2014 they tell the model what action is happening.</span>\n<blockquote>\n<span class=\"paragraph\"><em>In plain English.</em> Instead of asking the network to predict a whole screen at once, we ask\nit one cell at a time: <em>\"given what's immediately around you and what the user just pressed,\nwhat character should live here next?\"</em> This is a tractable classification problem \u2014 and\nstill surprisingly hard when the \"action\" is Enter and the local patch contains very little\ninformation about what the command is going to print.</span>\n</blockquote></span>"}, "type": "data"}]}, {"code_hash": "85f68e41b0e6811e7faa96d9b5c1110a", "console": [], "id": "TXez", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "13098f7d2389bf3357224a1580110db1", "console": [], "id": "dNNg", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "0ddaa020eff8b9d7ce6b74575184abe8", "console": [], "id": "yCnT", "outputs": [{"data": {"text/html": "<span class=\"markdown prose dark:prose-invert\"><h3 id=\"sampling-strategy\">Sampling Strategy</h3>\n<span class=\"paragraph\">In a typical transition: ~395 cells stay the same, ~5 cells change.</span>\n<span class=\"paragraph\">Training on all cells equally \u2192 the model learns to copy everything (98% accuracy, 0% on cells that matter).</span>\n<span class=\"paragraph\"><strong>Our fix:</strong>\n- Keep <strong>all changed cells</strong> as positives\n- Sample a limited set of <strong>unchanged cells</strong> as negatives\n- This forces the model to learn real patterns, not just copying</span></span>"}, "type": "data"}]}, {"code_hash": "3e48b0f225e27ea76da2cdbd1b95a7ef", "console": [], "id": "wlCL", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "e1be4a8ba7b2b4bb71aff3007cb3a08a", "console": [], "id": "kqZH", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "57352adfe4ef74520d549e342f1ed245", "console": [], "id": "wAgl", "outputs": [{"data": {"text/html": "<span class=\"markdown prose dark:prose-invert\"><hr />\n<span class=\"paragraph\"><a id=\"part-4\"></a></span>\n<h1 id=\"part-4-the-mlp-baseline-model\"><iconify-icon icon='lucide:brain' inline></iconify-icon> Part 4: The MLP Baseline Model</h1>\n<span class=\"paragraph\">We use a simple <strong>Multi-Layer Perceptron (MLP)</strong>:</span>\n<table>\n<thead>\n<tr>\n<th>Layer</th>\n<th>Size</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Input</td>\n<td>981</td>\n<td>Features (or fewer with less conditioning)</td>\n</tr>\n<tr>\n<td>Hidden</td>\n<td>128</td>\n<td>ReLU activation</td>\n</tr>\n<tr>\n<td>Output</td>\n<td>97</td>\n<td>Softmax over vocabulary</td>\n</tr>\n</tbody>\n</table>\n<span class=\"paragraph\"><strong>Loss:</strong> Cross-entropy, <code>Loss = -log(P(correct_char))</code></span>\n<span class=\"paragraph\"><strong>Why MLP?</strong> It treats each cell independently, using only local context. This is a strong baseline because:</span>\n<ol>\n<li>Most screen changes are local</li>\n<li>The 3\u00d73 patch usually suffices</li>\n<li>Fast to train on CPU</li>\n</ol>\n<span class=\"paragraph\"><strong>Weakness:</strong> Enter predictions require knowing command outputs \u2014 more than local context.</span>\n<blockquote>\n<span class=\"paragraph\"><em>In plain English.</em> The MLP is about as unopinionated a neural network as you can get \u2014\nno recurrence, no attention, just one hidden layer. If <em>this</em> can partially imitate a\nterminal, the paper's claim that \"computation can be distilled from traces\" starts to\nfeel less crazy. If it flatlines on Enter steps (spoiler: it doesn't, for some commands),\nwe'd need a model with more global context.</span>\n</blockquote></span>"}, "type": "data"}]}, {"code_hash": "7bd35470740abf1944a860b8b217670c", "console": [], "id": "rEll", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "24bcca0a0b4be937173f71db4b7c59be", "console": [], "id": "dGlV", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "e0f86b8148ae3e28b1af628e7db27174", "console": [], "id": "SdmI", "outputs": [{"data": {"text/html": "<marimo-accordion data-labels='[&quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;iconify-icon icon=&#x27;lucide:sigma&#x27; inline&gt;&lt;/iconify-icon&gt; Training objective &amp;amp; hyperparameters  (math)&lt;/span&gt;&lt;/span&gt;&quot;]' data-multiple='false'><div><div style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.75rem'><span class=\"markdown prose dark:prose-invert\"><h3 id=\"training-objective\">Training objective</h3>\n<span class=\"paragraph\">Given a dataset <marimo-tex class=\"arithmatex\">||(\\mathcal{D} = \\{(x_i,\\, y_i)\\}_{i=1}^{N}||)</marimo-tex> where <marimo-tex class=\"arithmatex\">||(x_i = \\phi(s_t, r, c, a_t)||)</marimo-tex>\nis the feature vector for one cell and <marimo-tex class=\"arithmatex\">||(y_i \\in \\{0, \\dots, 96\\}||)</marimo-tex> is the index of the\ncharacter that the true dynamics produces at that cell, we minimize the <strong>cross-entropy</strong></span>\n<marimo-tex class=\"arithmatex\">||[\n\\mathcal{L}(\\theta) \\;=\\; -\\frac{1}{N} \\sum_{i=1}^{N} \\log f_\\theta(x_i)[y_i]\n\\;=\\; -\\frac{1}{N} \\sum_{i=1}^{N} \\log \\frac{\\exp(z_{i,y_i})}{\\sum_{c=0}^{96} \\exp(z_{i,c})}\n||]</marimo-tex><span class=\"paragraph\">with <marimo-tex class=\"arithmatex\">||(z_i = W_2\\,\\mathrm{ReLU}(W_1 x_i + b_1) + b_2 \\in \\mathbb{R}^{97}||)</marimo-tex> the pre-softmax logits.\nBecause each cell is a single classification, this is exactly the loss of a 97-way\nmultinomial logistic regression on top of one ReLU layer.</span>\n<span class=\"paragraph\"><strong>Why include unchanged cells?</strong> The dataset <marimo-tex class=\"arithmatex\">||(\\mathcal{D}||)</marimo-tex> mixes in\n<marimo-tex class=\"arithmatex\">||(\\texttt{neg\\_ratio} \\times||)</marimo-tex> \"cells that did not change this step\". Without them the\nmodel could cheat by always predicting a non-copy character. Concretely, for every\nunchanged cell we set <marimo-tex class=\"arithmatex\">||(y_i = s_t^{(r,c)}||)</marimo-tex> so the correct answer is \"leave it alone\".</span></span><div style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'><div style='flex: 1'><marimo-stat data-value='&quot;Adam&quot;' data-label='&quot;Optimizer&quot;' data-caption='&quot;sklearn default&quot;' data-bordered='false'></marimo-stat></div><div style='flex: 1'><marimo-stat data-value='&quot;2e-3&quot;' data-label='&quot;Learning rate&quot;' data-caption='&quot;constant&quot;' data-bordered='false'></marimo-stat></div><div style='flex: 1'><marimo-stat data-value='&quot;256&quot;' data-label='&quot;Batch size&quot;' data-caption='&quot;mini-batch SGD&quot;' data-bordered='false'></marimo-stat></div><div style='flex: 1'><marimo-stat data-value='&quot;25&quot;' data-label='&quot;Epochs&quot;' data-caption='&quot;partial_fit passes&quot;' data-bordered='false'></marimo-stat></div><div style='flex: 1'><marimo-stat data-value='&quot;128&quot;' data-label='&quot;Hidden units&quot;' data-caption='&quot;ReLU&quot;' data-bordered='false'></marimo-stat></div><div style='flex: 1'><marimo-stat data-value='&quot;8:1&quot;' data-label='&quot;Neg / pos ratio&quot;' data-caption='&quot;keep-still samples&quot;' data-bordered='false'></marimo-stat></div></div><marimo-callout-output data-html='&quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;strong&gt;In plain English.&lt;/strong&gt; We ask the model: &lt;em&gt;for this cell, what character should come next?&lt;/em&gt;  We reward it when it says the right letter (loss near zero) and punish it harder the more confidently it says the wrong one. We also sprinkle in lots of cells that &lt;em&gt;shouldn&#x27;t&lt;/em&gt; change, so the model learns when to stay quiet.&lt;/span&gt;&lt;/span&gt;&quot;' data-kind='&quot;info&quot;'></marimo-callout-output></div></div></marimo-accordion>"}, "type": "data"}]}, {"code_hash": "111e0da45accf3ff468f23175bfcc6c9", "console": [], "id": "lgWD", "outputs": [{"data": {"text/html": "<span class=\"markdown prose dark:prose-invert\"><h3 id=\"try-it-yourself\">Try It Yourself</h3>\n<span class=\"paragraph\">Train an MLP with different settings to see how conditioning affects accuracy.</span></span>"}, "type": "data"}]}, {"code_hash": "f84d1e551caf963a4b156d84fedc4f56", "console": [], "id": "yOPj", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "bede70b694b03753100ab1b24c6948d7", "console": [], "id": "fwwy", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "1290c86fcd7fea28a40a6fcbb92b2a42", "console": [], "id": "LJZf", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "86f5cfbfba588134b15acb46d10fc899", "console": [], "id": "urSm", "outputs": [{"data": {"text/html": "<marimo-accordion data-labels='[&quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;iconify-icon icon=&#x27;lucide:ruler&#x27; inline&gt;&lt;/iconify-icon&gt; Evaluation protocol  (math)&lt;/span&gt;&lt;/span&gt;&quot;]' data-multiple='false'><div><div style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.75rem'><span class=\"markdown prose dark:prose-invert\"><h3 id=\"evaluation-protocol\">Evaluation protocol</h3>\n<span class=\"paragraph\">The honest question isn't \"how many of the 400 cells are right\" \u2014 a model that just copies the\ncurrent screen already scores around <marimo-tex class=\"arithmatex\">||(95\\%||)</marimo-tex> on that. The honest question is <strong>\"when the screen\nwas supposed to change, did the model predict the right character?\"</strong>. Formally, define the\nset of changed-cell events across the test episodes as</span>\n<marimo-tex class=\"arithmatex\">||[\n\\mathcal{C} \\;=\\; \\bigl\\{\\,(r, c, t) \\,:\\; s_t^{(r,c)} \\neq s_{t+1}^{(r,c)}\\,\\bigr\\}.\n||]</marimo-tex><span class=\"paragraph\">The metric we report is</span>\n<marimo-tex class=\"arithmatex\">||[\n\\mathrm{acc} \\;=\\; \\frac{1}{|\\mathcal{C}|}\n\\sum_{(r,c,t)\\in\\mathcal{C}}\n\\mathbf{1}\\!\\left[\\,\n  \\arg\\max_{y}\\; f_\\theta\\!\\bigl(\\phi(s_t, r, c, a_t)\\bigr)[y]\n  \\;=\\; s_{t+1}^{(r,c)}\n\\,\\right].\n||]</marimo-tex><span class=\"paragraph\">Additionally we split <marimo-tex class=\"arithmatex\">||(\\mathcal{C}||)</marimo-tex> by action kind:</span>\n<marimo-tex class=\"arithmatex\">||[\n\\mathcal{C}_{\\text{typing}} = \\{(r,c,t) \\in \\mathcal{C} : a_t.\\text{kind} \\neq \\text{enter}\\},\n\\qquad\n\\mathcal{C}_{\\text{enter}}  = \\{(r,c,t) \\in \\mathcal{C} : a_t.\\text{kind} = \\text{enter}\\}.\n||]</marimo-tex><span class=\"paragraph\">The asymmetry between <marimo-tex class=\"arithmatex\">||(\\mathrm{acc}_{\\text{typing}}||)</marimo-tex> and <marimo-tex class=\"arithmatex\">||(\\mathrm{acc}_{\\text{enter}}||)</marimo-tex> is\nthe whole story in a single number pair. Typing accuracy measures \"can the model follow\nmechanical rules\"; Enter accuracy measures \"does the model <em>know what the command does</em>\".</span></span><marimo-callout-output data-html='&quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;strong&gt;In plain English.&lt;/strong&gt; If a model just stared and did nothing, 380 of the 400 cells would still be right by accident. That&#x27;s a trap. Instead we only grade the model on cells that were &lt;em&gt;supposed&lt;/em&gt; to change. Two sub-grades &#92;u2014 typing and Enter &#92;u2014 separate mechanical skill from actual understanding.&lt;/span&gt;&lt;/span&gt;&quot;' data-kind='&quot;info&quot;'></marimo-callout-output></div></div></marimo-accordion>"}, "type": "data"}]}, {"code_hash": "9e764b6131da2aef61f46a7182e79126", "console": [], "id": "jxvo", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "3a33d6d81e3fe23e9dd7360b59943064", "console": [], "id": "mWxS", "outputs": [{"data": {"text/html": "<span class=\"markdown prose dark:prose-invert\"><h3 id=\"model-analysis\"><iconify-icon icon='lucide:microscope' inline></iconify-icon> Model Analysis</h3>\n<span class=\"paragraph\">The analysis tab below only lights up after you <strong>train a model</strong> in the Training tab. Once you do,\nit unlocks seven complementary views that turn the trained MLP into something you can interrogate,\nnot just a number:</span>\n<ol>\n<li><strong>Learning</strong> \u2014 did the loss actually go down?</li>\n<li><strong>Evolution</strong> \u2014 scrub across training epochs and watch the model's predicted next screen\n   morph from random garbage into a readable terminal, letter by letter.</li>\n<li><strong>Spatial</strong> \u2014 <em>where</em> on the 10\u00d740 screen does the model fail?</li>\n<li><strong>Probe</strong> \u2014 for a single cell, what is the model's full top-5 distribution?</li>\n<li><strong>Rollout</strong> \u2014 the paper's central question: if we let the model run <em>autoregressively</em>\n   (feeding its own predictions back as the next input), does it stay on track?</li>\n<li><strong>Characters</strong> \u2014 which output characters can the model actually learn?</li>\n<li><strong>Families</strong> \u2014 is <code>whoami</code> easier than <code>python -c 'print(7*8)'</code>? Per-family accuracy.</li>\n</ol>\n<blockquote>\n<span class=\"paragraph\"><em>In plain English.</em> The Neural Computers paper cares about one thing: can a network\ninternalize how a machine behaves just by watching transitions? Every tab below is a\ndifferent stethoscope on that question.</span>\n</blockquote></span>"}, "type": "data"}]}, {"code_hash": "7ea08ebbb61fb07def1411b4a9701643", "console": [], "id": "CcZR", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "af83445bf7353a0f16ac117c48d2ba04", "console": [], "id": "YWSi", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "419757032528c34811c2643e12017688", "console": [], "id": "zlud", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "6b2d6a2b1e2924b7c0163b961d8b929a", "console": [], "id": "tZnO", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "562913b560d629a2191d52f4e41b8ead", "console": [], "id": "xvXZ", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "bf6d889bc04c34352e4bde90d0ac9900", "console": [], "id": "CLip", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "e5a960f8c2baf7fdc2d776dd8a6823f8", "console": [], "id": "YECM", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "2c0453c8e90adf0e53828c2f92ba9943", "console": [], "id": "cEAS", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "1fd8d49fc2a7eebcbef4aa1c9022f1a5", "console": [], "id": "iXej", "outputs": [{"data": {"text/plai rem'><span class=\"markdown prose dark:prose-invert\"><span class=\"paragraph\"><strong>What runs when you press Train</strong></span>\n<ol>\n<li><strong>Episodes</strong> \u2014 synthetic terminal sessions (<code>generate_episodes</code>).</li>\n<li><strong>Dataset</strong> \u2014 one row per <em>changed</em> cell plus sampled unchanged negatives (<code>build_training_dataset</code>; <code>neg_ratio</code> is the main anti-cheating knob).</li>\n<li><strong>Model</strong> \u2014 <code>sklearn.neural_network.MLPClassifier</code>: 981-dim input (with <code>full</code> conditioning), <strong>128</strong> ReLU units, <strong>97</strong>-way softmax.</li>\n<li><strong>Optimization</strong> \u2014 Adam-style updates via <strong><code>partial_fit</code></strong>, <strong>25</strong> epochs, batch <strong>256</strong>, learning rate <strong>2\u00d710\u207b\u00b3</strong>; snapshots each epoch feed the <strong>Evolution</strong> analysis tab.</li>\n<li><strong>Evaluation</strong> \u2014 changed-cell accuracy split into <strong>typing</strong> vs <strong>Enter</strong> on held-out episodes (<code>evaluate_model</code>).</li>\n</ol>\n<span class=\"paragraph\">Implementation code is <strong>hidden in this molab-style view</strong> (<code>hide_code=True</code> on cells) so judges see behaviour first. The full notebook source is the single file:</span>\n<span class=\"paragraph\"><a href=\"https://github.com/Srinivas-Raghav-VC/tiny-neural-os/blob/main/notebooks/neural_computers_competition.py\" rel=\"noopener\" target=\"_blank\">github.com/Srinivas-Raghav-VC/tiny-neural-os \u2014 <code>notebooks/neural_computers_competition.py</code></a></span></span><marimo-callout-output data-html='&quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;strong&gt;Reproducibility.&lt;/strong&gt; Training still executes in this notebook when you use the controls below &#92;u2014 nothing is fake. To read the exact &lt;code&gt;MLPClassifier&lt;/code&gt; loop, clone the repo or open the &lt;code&gt;.py&lt;/code&gt; file on GitHub.&lt;/span&gt;&lt;/span&gt;&quot;' data-kind='&quot;info&quot;'></marimo-callout-output></div></div></marimo-accordion><div style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.75rem'><marimo-ui-element object-id='yOPj-8' random-id='41db2a13-b475-6f3b-b10c-ccdaaded3c54'><marimo-form data-initial-value='null' data-label='null' data-element-id='&quot;yOPj-7&quot;' data-loading='false' data-bordered='true' data-submit-button-label='&quot;Train Model&quot;' data-submit-button-tooltip='&quot;Train an MLP with these settings&quot;' data-submit-button-disabled='false' data-clear-on-submit='false' data-show-clear-button='true' data-clear-button-label='&quot;Reset&quot;' data-should-validate='false'><marimo-ui-element object-id='yOPj-7' random-id='7ed74019-fdb2-ba75-b14f-afc2a7925480'><marimo-dict data-initial-value='{&quot;episodes&quot;: 40, &quot;conditioning&quot;: &quot;Full (+ typed char)&quot;}' data-label='null' data-element-ids='{&quot;yOPj-5&quot;: &quot;episodes&quot;, &quot;yOPj-6&quot;: &quot;conditioning&quot;}'><span class=\"markdown prose dark:prose-invert\"><span class=\"paragraph\"><strong>Configure training:</strong></span>\n<span class=\"paragraph\"><marimo-ui-element object-id='yOPj-5' random-id='2e6acd14-3504-36d3-17f1-ddc3f5471dcd'><marimo-number data-initial-value='40' data-label='&quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Training episodes&lt;/span&gt;&lt;/span&gt;&quot;' data-start='10' data-stop='200' data-step='10' data-debounce='false' data-full-width='false' data-disabled='false'></marimo-number></marimo-ui-element></span>\n<span class=\"paragraph\"><marimo-ui-element object-id='yOPj-6' random-id='65ed4000-c2a6-77e8-455a-74ced622ee82'><marimo-radio data-initial-value='&quot;Full (+ typed char)&quot;' data-label='&quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Conditioning level&lt;/span&gt;&lt;/span&gt;&quot;' data-options='[&quot;None (patch only)&quot;, &quot;Family (+ action, family)&quot;, &quot;Full (+ typed char)&quot;]' data-inline='true' data-disabled='false'></marimo-radio></marimo-ui-element></span></span></marimo-dict></marimo-ui-element></marimo-form></marimo-ui-element></div><marimo-callout-output data-html='&quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Click &lt;strong&gt;Train Model&lt;/strong&gt; above to train an MLP and see the results.&lt;/span&gt;&lt;/span&gt;&quot;' data-kind='&quot;info&quot;'></marimo-callout-output></div></div><div data-kind='tab'><div style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.75rem'><marimo-callout-output data-html='&quot;&lt;div style=&#x27;display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem&#x27;&gt;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;strong&gt;Probe / Anatomy shared control.&lt;/strong&gt; Slide to pick which step of the current Playground episode the Probe and Anatomy tabs inspect.&lt;/span&gt;&lt;/span&gt;&lt;marimo-ui-element object-id=&#x27;zlud-0&#x27; random-id=&#x27;216683f6-c6ed-9440-30bd-9d0f28cca49b&#x27;&gt;&lt;marimo-slider data-initial-value=&#x27;3&#x27; data-label=&#x27;&amp;quot;&amp;lt;span class=&amp;#92;&amp;quot;markdown prose dark:prose-invert&amp;#92;&amp;quot;&amp;gt;&amp;lt;span class=&amp;#92;&amp;quot;paragraph&amp;#92;&amp;quot;&amp;gt;Probe step (in the Playground episode)&amp;lt;/span&amp;gt;&amp;lt;/span&amp;gt;&amp;quot;&#x27; data-start=&#x27;1&#x27; data-stop=&#x27;7&# rcle&#x27; inline&gt;&lt;/iconify-icon&gt; Rollout&lt;/span&gt;&lt;/span&gt;&quot;, &quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;iconify-icon icon=&#x27;lucide:bar-chart-3&#x27; inline&gt;&lt;/iconify-icon&gt; Characters&lt;/span&gt;&lt;/span&gt;&quot;, &quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;iconify-icon icon=&#x27;lucide:layers&#x27; inline&gt;&lt;/iconify-icon&gt; Families&lt;/span&gt;&lt;/span&gt;&quot;]'><div data-kind='tab'><marimo-callout-output data-html='&quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Train a model in the &lt;strong&gt;Training&lt;/strong&gt; tab to see the loss curve.&lt;/span&gt;&lt;/span&gt;&quot;' data-kind='&quot;info&quot;'></marimo-callout-output></div><div data-kind='tab'><marimo-callout-output data-html='&quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Train a model first. This tab will then let you scrub across epochs to watch the model&#x27;s predicted next screen evolve from garbage into something readable.&lt;/span&gt;&lt;/span&gt;&quot;' data-kind='&quot;info&quot;'></marimo-callout-output></div><div data-kind='tab'><marimo-callout-output data-html='&quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Train a model to generate the per-position accuracy heatmap.&lt;/span&gt;&lt;/span&gt;&quot;' data-kind='&quot;info&quot;'></marimo-callout-output></div><div data-kind='tab'><marimo-callout-output data-html='&quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Train a model first, then use this probe to inspect a specific cell.&lt;/span&gt;&lt;/span&gt;&quot;' data-kind='&quot;info&quot;'></marimo-callout-output></div><div data-kind='tab'><marimo-callout-output data-html='&quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Train a model first. This tab opens up the model&#x27;s internals: the feature vector broken into its five semantic blocks, the 128 hidden-layer activations, the softmax distribution, and a feature-ablation experiment that shows what information the model actually uses.&lt;/span&gt;&lt;/span&gt;&quot;' data-kind='&quot;info&quot;'></marimo-callout-output></div><div data-kind='tab'><marimo-callout-output data-html='&quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Train a model first. Rollout uses the &lt;strong&gt;Playground&lt;/strong&gt; command + phrasing selection so switching those controls also switches the rollout episode.&lt;/span&gt;&lt;/span&gt;&quot;' data-kind='&quot;info&quot;'></marimo-callout-output></div><div data-kind='tab'><marimo-callout-output data-html='&quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Train a model to see per-character Enter accuracy.&lt;/span&gt;&lt;/span&gt;&quot;' data-kind='&quot;info&quot;'></marimo-callout-output></div><div data-kind='tab'><marimo-callout-output data-html='&quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Train a model to see per-family accuracy.&lt;/span&gt;&lt;/span&gt;&quot;' data-kind='&quot;info&quot;'></marimo-callout-output></div></marimo-tabs></marimo-ui-element></div></div></marimo-tabs></marimo-ui-element>"}, "type": "data"}]}, {"code_hash": "d1c14971d134c29ad2f95aee1e39d332", "console": [], "id": "dxZZ", "outputs": [{"data": {"text/html": "<span class=\"markdown prose dark:prose-invert\"><hr />\n<span class=\"paragraph\"><a id=\"part-5\"></a></span>\n<h1 id=\"part-5-benchmark-comparison\"><iconify-icon icon='lucide:bar-chart-2' inline></iconify-icon> Part 5: Benchmark Comparison</h1>\n<span class=\"paragraph\">We compare three architectures:</span>\n<table>\n<thead>\n<tr>\n<th>Model</th>\n<th>Architecture</th>\n<th>Key Property</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>MLP</strong></td>\n<td>Per-cell classifier</td>\n<td>Fast, local-only</td>\n</tr>\n<tr>\n<td><strong>Transformer</strong></td>\n<td>Attention over screen</td>\n<td>Global dependencies</td>\n</tr>\n<tr>\n<td><strong>GRU</strong></td>\n<td>Recurrent over screen</td>\n<td>Sequential processing</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"four-experimental-settings\">Four experimental settings</h3>\n<table>\n<thead>\n<tr>\n<th>Setting</th>\n<th>Train/Test</th>\n<th>Conditioning</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Standard / Family</td>\n<td>Same commands</td>\n<td>Command family only</td>\n</tr>\n<tr>\n<td>Standard / Command</td>\n<td>Same commands</td>\n<td>Exact command text</td>\n</tr>\n<tr>\n<td>Paraphrase / Family</td>\n<td>Train phrasing 1, test 2\u20133</td>\n<td>Family only</td>\n</tr>\n<tr>\n<td>Paraphrase / Command</td>\n<td>Train phrasing 1, test 2\u20133</td>\n<td>Exact text</td>\n</tr>\n</tbody>\n</table>\n<span class=\"paragraph\"><strong>Paraphrase</strong> tests generalization: can the model handle <code>echo $USER</code> after only seeing <code>whoami</code>?</span>\n<blockquote>\n<span class=\"paragraph\"><em>In plain English.</em> The MLP is the \"tell me which program you're running\" baseline. The\nTransformer and GRU have more machinery to figure it out themselves. The Paraphrase rows\nare where the paper's ambition shows up: a neural computer that only works on verbatim\ninputs isn't really a computer.</span>\n</blockquote></span>"}, "type": "data"}]}, {"code_hash": "dd1d123db745447ac763bc84e6af8b18", "console": [], "id": "dlnW", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "1556a9b7c25d65bcc33f5c117527f4f6", "console": [], "id": "TTti", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "e0d5bf5ff4a4dff959c1856cbe6ded5f", "console": [], "id": "RKFZ", "outputs": [{"data": {"text/html": "<div style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: center;flex-wrap: nowrap;gap: 1rem'><span class=\"markdown prose dark:prose-invert\"><span class=\"paragraph\"><strong>Filter by metric:</strong></span></span><marimo-ui-element object-id='TTti-0' random-id='0d44c767-0cb7-25bf-5644-9e01c499b238'><marimo-radio data-initial-value='&quot;Overall (changed cells)&quot;' data-label='&quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Metric&lt;/span&gt;&lt;/span&gt;&quot;' data-options='[&quot;Overall (changed cells)&quot;, &quot;Typing only&quot;, &quot;Enter only&quot;, &quot;Exact line match&quot;]' data-inline='true' data-disabled='false'></marimo-radio></marimo-ui-element></div>"}, "type": "data"}]}, {"code_hash": "ad91fbada15ac707c38820a712706888", "console": [], "id": "IaQp", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "adf9064cfcdc5cc31c7057ef66a9080c", "console": [], "id": "IWgg", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "8805dcab494d94f601d77fba1ea4111b", "console": [], "id": "fCoF", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "a61814f591b4a15d1b86f8697e9bd5e0", "console": [], "id": "LkGn", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "1bd3bcc28b07c9172e4f2806d2762f60", "console": [], "id": "zVRe", "outputs": [{"data": {"text/html": "<span class=\"markdown prose dark:prose-invert\"><h3 id=\"derived-views-conditioning-delta-and-paraphrase-penalty\">Derived views: conditioning delta and paraphrase penalty</h3>\n<span class=\"paragraph\">The grouped bar chart shows the raw scores, but two derived questions are especially useful:</span>\n<ol>\n<li><strong>What happens when we reveal the exact command?</strong>\n   This is the delta from <code>Family</code> \u2192 <code>Command</code> within the same train/test regime. Positive = helps,\n   negative = the model was better off only knowing the family.</li>\n<li><strong>How much does paraphrase hurt?</strong>\n   This is the drop from <code>Standard</code> \u2192 <code>Paraphrase</code> under the same conditioning level.</li>\n</ol>\n<span class=\"paragraph\">These views turn four settings into two interpretable comparisons and surface the surprising case\nwhere giving the Transformer the exact command actually <em>reduces</em> its accuracy.</span></span>"}, "type": "data"}]}, {"code_hash": "647bc934391cebd89eea1c638739fd8b", "console": [], "id": "woaO", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "39470aef6954e35b7f4d4863daa13dfc", "console": [], "id": "HnMC", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "9912b43b1ddc21d689a704b0d642347b", "console": [], "id": "wadT", "outputs": [{"data": {"text/html": "<span class=\"markdown prose dark:prose-invert\"><h3 id=\"typing-vs-enter-tradeoff\">Typing vs Enter Tradeoff</h3></span>"}, "type": "data"}]}, {"code_hash": "98b7824fc309be32b2a542c424ccf937", "console": [], "id": "VCRE", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "ffc058e208ef5feb2b2573fc1be2ba5a", "console": [], "id": "hgqU", "outputs": [{"data": {"text/html": "<span class=\"markdown prose dark:prose-invert\"><h3 id=\"full-results-table\">Full Results Table</h3></span>"}, "type": "data"}]}, {"code_hash": "1e981699395bc8706a167e72396dc927", "console": [], "id": "PSUk", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "ff9e8b04c91d78bf8e784fb9a14ab0fe", "console": [], "id": "mfOT", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "49ae2da792fd28f399a018a27400a37a", "console": [], "id": "vGiW", "outputs": [{"data": {"text/html": "<marimo-ui-element object-id='vGiW-4' random-id='ec01870a-deed-36cc-a300-a272999b7272'><marimo-tabs data-initial-value='&quot;0&quot;' data-label='null' data-tabs='[&quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Overview&lt;/span&gt;&lt;/span&gt;&quot;, &quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Heatmap&lt;/span&gt;&lt;/span&gt;&quot;, &quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Derived&lt;/span&gt;&lt;/span&gt;&quot;, &quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Tradeoff&lt;/span&gt;&lt;/span&gt;&quot;, &quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Table&lt;/span&gt;&lt;/span&gt;&quot;, &quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Explorer&lt;/span&gt;&lt;/span&gt;&quot;]'><div data-kind='tab'><div style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 1rem'><div style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'><div style='flex: 1'><marimo-stat data-value='&quot;74.5%&quot;' data-label='&quot;&lt;iconify-icon icon=&#x27;lucide:trophy&#x27; inline style=&#x27;color: gold&#x27;&gt;&lt;/iconify-icon&gt; MLP&quot;' data-caption='&quot;Winner&quot;' data-bordered='false'></marimo-stat></div><div style='flex: 1'><marimo-stat data-value='&quot;51.2%&quot;' data-label='&quot;&lt;iconify-icon icon=&#x27;lucide:award&#x27; inline style=&#x27;color: silver&#x27;&gt;&lt;/iconify-icon&gt; Transformer&quot;' data-caption='&quot;Second place&quot;' data-bordered='false'></marimo-stat></div><div style='flex: 1'><marimo-stat data-value='&quot;19.9%&quot;' data-label='&quot;&lt;iconify-icon icon=&#x27;lucide:medal&#x27; inline style=&#x27;color: #cd7f32&#x27;&gt;&lt;/iconify-icon&gt; GRU&quot;' data-caption='&quot;Third place&quot;' data-bordered='false'></marimo-stat></div></div><span class=\"markdown prose dark:prose-invert\"><h3 id=\"understanding-the-results\">Understanding the results</h3>\n<span class=\"paragraph\">Four patterns emerge from the actual saved runs:</span>\n<span class=\"paragraph\"><strong>1. MLP wins decisively.</strong> Across the four settings, the simple per-cell MLP gets the highest\nmean changed-cell accuracy (\u224875%). Most screen updates are local \u2014 a 3\u00d73 patch plus the typed\ncharacter is enough to predict them \u2014 so a specialist beats the general sequence models here.</span>\n<span class=\"paragraph\"><strong>2. Transformer is an <em>Enter specialist</em> \u2014 but only under family conditioning.</strong> On\n<code>Standard / Family</code> it reaches <strong>81.6%</strong> on Enter steps, clearly above MLP's 48.4%. The moment we\nhand it the exact typed command, its Enter score collapses to \u224858% and its typing score drops\nto 38%. It seems to lean on the conditioning it was given rather than the screen.</span>\n<span class=\"paragraph\"><strong>3. GRU is a true negative result.</strong> Changed-cell accuracy sits around 20% across all four\nsettings, basically at the level of copying the previous frame. It picks up character accuracy\n(&gt;96%) only because most cells don't change. This is worth reporting honestly \u2014 not every\narchitecture transfers to this task.</span>\n<span class=\"paragraph\"><strong>4. Paraphrase hurts, but not equally.</strong> MLP loses \u22484 points going from <code>Standard / Family</code> to\n<code>Paraphrase / Family</code>
