2;&quot;ExactLine&#92;&quot;:&#92;&quot;88.9%&#92;&quot;},{&#92;&quot;_marimo_row_id&#92;&quot;:9,&#92;&quot;Model&#92;&quot;:&#92;&quot;Transformer&#92;&quot;,&#92;&quot;Setting&#92;&quot;:&#92;&quot;Standard / Command&#92;&quot;,&#92;&quot;Overall&#92;&quot;:&#92;&quot;47.6%&#92;&quot;,&#92;&quot;Typing&#92;&quot;:&#92;&quot;38.2%&#92;&quot;,&#92;&quot;Enter&#92;&quot;:&#92;&quot;57.8%&#92;&quot;,&#92;&quot;ExactLine&#92;&quot;:&#92;&quot;88.7%&#92;&quot;},{&#92;&quot;_marimo_row_id&#92;&quot;:10,&#92;&quot;Model&#92;&quot;:&#92;&quot;Transformer&#92;&quot;,&#92;&quot;Setting&#92;&quot;:&#92;&quot;Paraphrase / Family&#92;&quot;,&#92;&quot;Overall&#92;&quot;:&#92;&quot;43.4%&#92;&quot;,&#92;&quot;Typing&#92;&quot;:&#92;&quot;36.7%&#92;&quot;,&#92;&quot;Enter&#92;&quot;:&#92;&quot;47.2%&#92;&quot;,&#92;&quot;ExactLine&#92;&quot;:&#92;&quot;87.4%&#92;&quot;},{&#92;&quot;_marimo_row_id&#92;&quot;:11,&#92;&quot;Model&#92;&quot;:&#92;&quot;Transformer&#92;&quot;,&#92;&quot;Setting&#92;&quot;:&#92;&quot;Paraphrase / Command&#92;&quot;,&#92;&quot;Overall&#92;&quot;:&#92;&quot;49.6%&#92;&quot;,&#92;&quot;Typing&#92;&quot;:&#92;&quot;46.5%&#92;&quot;,&#92;&quot;Enter&#92;&quot;:&#92;&quot;42.1%&#92;&quot;,&#92;&quot;ExactLine&#92;&quot;:&#92;&quot;83.7%&#92;&quot;}]&quot;' data-total-rows='12' data-total-columns='6' data-max-columns='50' data-banner-text='&quot;&quot;' data-pagination='false' data-page-size='15' data-field-types='[[&quot;Model&quot;, [&quot;string&quot;, &quot;object&quot;]], [&quot;Setting&quot;, [&quot;string&quot;, &quot;object&quot;]], [&quot;Overall&quot;, [&quot;string&quot;, &quot;object&quot;]], [&quot;Typing&quot;, [&quot;string&quot;, &quot;object&quot;]], [&quot;Enter&quot;, [&quot;string&quot;, &quot;object&quot;]], [&quot;ExactLine&quot;, [&quot;string&quot;, &quot;object&quot;]]]' data-selection='&quot;single&quot;' data-show-filters='true' data-show-download='true' data-show-column-summaries='true' data-show-data-types='true' data-show-page-size-selector='true' data-show-column-explorer='true' data-show-chart-builder='true' data-row-headers='[]' data-has-stable-row-id='true' data-lazy='false' data-preload='false'></marimo-table></marimo-ui-element></div></div><div data-kind='tab'><marimo-ui-element object-id='vGiW-3' random-id='460340ab-5acd-cc2c-e21a-2e2415cd52a4'><marimo-lazy data-initial-value='false' data-label='null' data-show-loading-indicator='false'></marimo-lazy></marimo-ui-element></div></marimo-tabs></marimo-ui-element>"}, "type": "data"}]}, {"code_hash": "450b6e5570b28aabd50abc5629035af6", "console": [], "id": "SYQT", "outputs": [{"data": {"text/html": "<span class=\"markdown prose dark:prose-invert\"><hr />\n<span class=\"paragraph\"><a id=\"gallery\"></a></span>\n<h1 id=\"live-gallery-the-model-you-trained-running-on-every-command-family\"><iconify-icon icon='lucide:play-circle' inline></iconify-icon> Live Gallery \u2014 the model <em>you</em> trained, running on every command family</h1>\n<span class=\"paragraph\">The <a href=\"#hero-gallery\">Hero Gallery</a> at the top shows a cached run with the default hyperparameters.\nThis section is the <strong>interactive twin</strong>: it uses the MLP you just trained in Part 4 \u2014 with whatever\n<code>neg_ratio</code>, <code>conditioning</code> level, epoch count, and random seed you picked \u2014 and runs it\nautoregressively on one canonical variant per command family. Change a slider in Part 4, hit train, and\nwatch the predictions below change.</span>\n<span class=\"paragraph\">Use this to answer questions the cached gallery can't:\n<em>What happens if I drop <code>neg_ratio</code> to 1?</em> (hint: the model trivially \"predicts\" the input.)\n<em>What if I switch from <code>full</code> to <code>family</code> conditioning?</em> (hint: typing accuracy collapses.)\n<em>Does training for 5 epochs produce anything coherent?</em> (hint: not really \u2014 see Evolution tab.)</span>\n<blockquote>\n<span class=\"paragraph\">Train a model in Part 4 first; this section is empty until there is a <code>trained_model</code> to run.</span>\n</blockquote></span>"}, "type": "data"}]}, {"code_hash": "a05b05aa37043cc861d862c665ee9831", "console": [], "id": "bMrW", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "0ffb3f6b5f55eb15f82be5ae1eb3a337", "console": [], "id": "PSQn", "outputs": [{"data": {"text/html": "<marimo-callout-output data-html='&quot;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Train a model in &lt;strong&gt;Part 4&lt;/strong&gt; first. Once &lt;code&gt;trained_model&lt;/code&gt; is available, this section will render one AR rollout per command family.&lt;/span&gt;&lt;/span&gt;&quot;' data-kind='&quot;warn&quot;'></marimo-callout-output>"}, "type": "data"}]}, {"code_hash": "1bb3caff5cf7534b97dc857be43e0551", "console": [], "id": "OfTS", "outputs": [{"data": {"text/html": "<span class=\"markdown prose dark:prose-invert\"><hr />\n<span class=\"paragraph\"><a id=\"part-6\"></a></span>\n<h1 id=\"part-6-conclusions\"><iconify-icon icon='lucide:check-circle' inline></iconify-icon> Part 6: Conclusions</h1></span>"}, "type": "data"}]}, {"code_hash": "c654899516ee293f52361171b2044dc8", "console": [], "id": "lQxp", "outputs": [{"data": {"text/html": "<div style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 1rem'><span class=\"markdown prose dark:prose-invert\"><h3 id=\"key-findings\">Key findings</h3></span><div style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 1rem'><div style='flex: 1'><marimo-callout-output data-html='&quot;&lt;div style=&#x27;display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem&#x27;&gt;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;h3 id=&#92;&quot;two-regimes&#92;&quot;&gt;Two regimes&lt;/h3&gt;&lt;/span&gt;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Typing is &lt;strong&gt;local and mechanical&lt;/strong&gt;.&lt;/span&gt;&#92;n&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Enter is &lt;strong&gt;semantic&lt;/strong&gt; &#92;u2014 it needs to know what the command prints.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&quot;' data-kind='&quot;info&quot;'></marimo-callout-output></div><div style='flex: 1'><marimo-callout-output data-html='&quot;&lt;div style=&#x27;display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem&#x27;&gt;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;h3 id=&#92;&quot;mlp-wins-overall&#92;&quot;&gt;MLP wins overall&lt;/h3&gt;&lt;/span&gt;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Mean changed-cell accuracy &#92;u2248 &lt;strong&gt;75%&lt;/strong&gt;.&lt;/span&gt;&#92;n&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;A 3&#92;u00d73 patch + conditioning beats attention and recurrence here.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&quot;' data-kind='&quot;success&quot;'></marimo-callout-output></div><div style='flex: 1'><marimo-callout-output data-html='&quot;&lt;div style=&#x27;display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem&#x27;&gt;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;h3 id=&#92;&quot;transformer-enter-specialist&#92;&quot;&gt;Transformer = Enter specialist&lt;/h3&gt;&lt;/span&gt;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;&lt;strong&gt;81.6%&lt;/strong&gt; on Enter (Standard / Family).&lt;/span&gt;&#92;n&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Edge disappears when exact command is given.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&quot;' data-kind='&quot;warn&quot;'></marimo-callout-output></div><div style='flex: 1'><marimo-callout-output data-html='&quot;&lt;div style=&#x27;display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem&#x27;&gt;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;h3 id=&#92;&quot;gru-flatlines&#92;&quot;&gt;GRU flatlines&lt;/h3&gt;&lt;/span&gt;&lt;span class=&#92;&quot;markdown prose dark:prose-invert&#92;&quot;&gt;&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;Changed-cell accuracy &#92;u2248 &lt;strong&gt;20%&lt;/strong&gt; everywhere.&lt;/span&gt;&#92;n&lt;span class=&#92;&quot;paragraph&#92;&quot;&gt;A reported negative result &#92;u2014 copying the previous frame is almost as good.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&quot;' data-kind='&quot;danger&quot;'></marimo-callout-output></div></div><span class=\"markdown prose dark:prose-invert\"><h3 id=\"what-this-means-for-neural-computers\">What this means for Neural Computers</h3>\n<span class=\"paragraph\">The paper's vision \u2014 learning computation from interface traces \u2014 runs into a concrete split on this toy:</span>\n<ul>\n<li><strong>Local typing updates are learnable</strong> from a tiny patch and a one-hot of the typed character.</li>\n<li><strong>Semantic updates (Enter)</strong> are where architectures actually differ: the Transformer picks up a weak but real signal when it has to guess the output from the command family, while the MLP and GRU can't.</li>\n<li><strong>Paraphrase stress-tests</strong> expose how much each model leaned on the surface form of the training commands.</li>\n</ul>\n<span class=\"paragraph\">A useful default for this kind of problem is therefore: <strong>start with a strong local baseline (MLP) and\nonly reach for sequence models where the local baseline measurably fails (here: Enter steps under\nfamily-only conditioning).</strong></span>\n<hr />\n<h3 id=\"what-the-paper-proposed-vs-what-we-built\">What the paper proposed vs. what we built</h3>\n<span class=\"paragraph\">We deliberately did <em>not</em> try to reproduce the full Neural Computers system \u2014 the competition asks for\none core idea, brought to life. Below is an honest mapping of what came from the paper, what we\nspecialised, and what we added on top.</span>\n<table>\n<thead>\n<tr>\n<th></th>\n<th><strong>Paper (Neural Computers)</strong></th>\n<th><strong>This notebook (Tiny Neural OS)</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>Core claim</strong></td>\n<td>A neural system can internalise computation, memory, and I/O from interface traces alone</td>\n<td>Test one primitive: next-screen prediction on a toy CLI</td>\n</tr>\n<tr>\n<td><strong>Input space</strong></td>\n<td>Arbitrary GUIs / OS-like interfaces</td>\n<td>10 \u00d7 40 character grid + discrete actions</td>\n</tr>\n<tr>\n<td><strong>Model</strong></td>\n<td>Large end-to-end neural runtime</td>\n<td>Per-cell classifier (3\u00d73 patch + conditioning)</td>\n</tr>\n<tr>\n<td><strong>Supervision</strong></td>\n<td>Large-scale interface recordings</td>\n<td><code>(screen, action) \u2192 next screen</code> from a scripted simulator</td>\n</tr>\n<tr>\n<td><strong>Our additions</strong></td>\n<td>\u2014</td>\n<td>Changed-cell metric, conditioning ablation, paraphrase split, AR-vs-TF gap, Evolution + Anatomy probes</td>\n</tr>\n</tbody>\n</table>\n<span class=\"paragraph\"><strong>Novel contributions vs. a direct paper-read:</strong></span>\n<ol>\n<li><strong>Changed-cell metric.</strong> Most cells don't change between frames on a sparse terminal, so\n   whole-screen accuracy trivially &gt; 99% for everything. We report accuracy only on cells that\n   actually changed \u2014 this is what makes the benchmark split between typing (easy) and Enter (hard)\n   visible in the first place. <em>Evidence: Part 5 Heatmap, Grouped bars, Tradeoff scatter.</em></li>\n<li><strong>Conditioning ablation.</strong> We vary how much the model is told about the action: just the action\n   type (<code>none</code>), a command-family one-hot (<code>family</code>), or the full typed character (<code>full</code>).\n   This turns the experiment into a controlled probe: does extra information help, or does the model\n   already have enough from the screen patch? <em>Evidence: Part 5 \u2192 Derived \u2192 conditioning-delta chart.</em></li>\n<li><strong>Paraphrase generalization split.</strong> Training on one phrasing (e.g. <code>whoami</code>) and testing on\n   another (e.g. <code>whoamI ; echo $USER</code>) separates \"memorizing surface form\" from \"knowing what the\n   command does\". <em>Evidence: Part 5 \u2192 Derived \u2192 paraphrase penalty chart.</em></li>\n<li><strong>Autoregressive vs teacher-forced.</strong> Standard next-step accuracy is teacher-forced \u2014 it hides\n   compounding errors. Feeding the model its own previous prediction back in reveals brittleness.\n   <em>Evidence: Analysis \u2192 Rollout.</em></li>\n<li><strong>Evolution view.</strong> The MLP trains with <code>partial_fit</code> one epoch at a time; we snapshot its\n   prediction on a reference Enter transition after each epoch so you can watch garbage become\n   <code>researcher</code> character by character. <em>Evidence: Analysis \u2192 Evolution.</em></li>\n<li><strong>Anatomy view.</strong> A single prediction decomposed into five stages \u2014 input patch, feature vector\n   segments, 128-unit ReLU activation map, softmax top-5, and per-segment ablation \u2014 so the model is\n   never a black box. <em>Evidence: Analysis \u2192 Anatomy.</em></li>\n</ol>\n<hr />\n<h3 id=\"lessons-learned-what-wed-tell-someone-attempting-this-tomorrow\">Lessons learned (what we'd tell someone attempting this tomorrow)</h3>\n<ul>\n<li><strong>Per-cell factorization is doing real work.</strong> A 3\u00d73 patch + a family one-hot is enough for the MLP to\n  beat a 4-layer Transformer on overall changed-cell accuracy. <em>Why:</em> most terminal transitions are\n  spatially local \u2014 the cursor moves, a character appears in one cell. Attention is overkill and harder\n  to train on CPU. <em>Evidence: Part 5 Overview \u2192 MLP is top-ranked on 3 of 4 slices.</em></li>\n<li><strong>The negative-sample ratio is load-bearing.</strong> We sample unchanged cells at 8\u00d7 the rate of changed\n  cells. Drop that and the model trivially learns \"output whatever was in this cell\" \u2014 changed-cell\n  accuracy collapses, overall accuracy stays &gt; 99%. <em>Evidence: Part 3 dataset summary; adjust the\n  <code>neg_ratio</code> slider to see this live.</em></li>\n<li><strong>Enter is where architecture matters; typing is where anything works.</strong> Every architecture we tried\n  gets &gt; 98% on typing. The interesting benchmark is the Enter column alone. <em>Evidence: Part 5 heatmap \u2014\n  look at the Enter rows, not the Overall row.</em></li>\n<li><strong>GRU's failure is informative.</strong> Scanning a 2D terminal left-to-right-then-down puts the answer\n  (the command on the prompt line) far from the cells being filled in on later lines. A left-to-right\n  recurrent network has to carry the conditioning signal through hundreds of unrelated positions.\n  <em>Evidence: Part 5 \u2192 heatmap row for GRU \u2014 near-floor in every setting, not just Enter.</em></li>\n<li><strong>Family conditioning helps less than you'd expect.</strong> Telling the model the command family (5-way\n  one-hot) gives the MLP a small but real lift on Enter, but telling it the <em>exact</em> typed character\n  (<code>full</code> conditioning) mostly matters for typing, which was already easy. <em>Evidence: Part 5 \u2192 Derived \u2192\n  conditioning delta chart \u2014 the bars for Enter are smaller than for typing.</em></li>\n<li><strong>Autoregressive rollout is the honest test.</strong> Teacher-forced accuracy is what most papers report, but\n  under AR, a wrong character on step <em>t</em> contaminates the 3\u00d73 patch used for step <em>t+1</em>. If a paper\n  reports only teacher-forced numbers, ask how they hold up under AR. <em>Evidence: Analysis \u2192 Rollout \u2014 the\n  AR line sits below the TF line on Enter steps, every time.</em></li>\n</ul>\n<hr />\n<h3 id=\"honest-limitations\">Honest limitations</h3>\n<ul>\n<li><strong>Scale.</strong> 10\u00d740 is tiny. The scaling behaviour of a per-cell MLP on a full 80\u00d724 terminal, or on a\n  GUI with thousands of visible pixels, is genuinely unknown from this experiment.</li>\n<li><strong>Semantic vocabulary.</strong> The model never learns <em>what</em> <code>whoami</code> means in a transferable way. It\n  learns an association between the token <code>whoami</code> and the byte sequence <code>researcher</code>. The paper's\n  ambition is much stronger than this.</li>\n<li><strong>Single-step objective.</strong> We predict only the next screen, not multi-step program execution. The\n  AR rollout approximates this but with no planning.</li>\n<li><strong>No notion of state beyond the screen.</strong> A real shell has environment variables, a working\n  directory, a process table. Our terminal has none of that, by construction.</li>\n</ul>\n<hr />\n<h3 id=\"reproducibility\">Reproducibility</h3>\n<div class=\"language-scdoc codehilite\"><pre><span></span><code>experiments/toy_nc_cli/\n\u251c\u2500\u2500 scripts/           # smoke_test.py, train_transformer_baseline.py, train_gru_baseline.py\n\u2514\u2500\u2500 results/\n    \u251c\u2500\u2500 baseline_comparison.csv      # table shown in Part 5\n    \u251c\u2500\u2500 mlp_matched_results.json     # per-action breakdown (MLP)\n    \u251c\u2500\u2500 transformer_results.json     # per-action breakdown (Transformer)\n    \u2514\u2500\u2500 gru_results.json             # per-action breakdown (GRU)\n</code></pre></div>\n<span class=\"paragraph\">All numbers in Part 5 are read off <code>baseline_comparison.csv</code>. To reproduce the MLP run locally on CPU,\nuse the interactive trainer in Part 4 \u2014 the Transformer and GRU rows come from the matching scripts\nin <code>experiments/toy_nc_cli/scripts/</code>.</span>\n<hr />\n<span class=\"paragraph\"><em>Built with <a href=\"https://marimo.io/\" rel=\"noopener\" target=\"_blank\">marimo</a> \u00b7 Inspired by <a href=\"https://arxiv.org/abs/2604.06425\" rel=\"noopener\" target=\"_blank\">Neural Computers (arXiv:2604.06425)</a></em></span></span></div>"}, "type": "data"}]}], "metadata": {"marimo_version": "0.15.2"}, "version": "1"},
            "runtimeConfig": null,
        };
    </script>
