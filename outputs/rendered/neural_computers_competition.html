      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

            "session": {"cells": [{"code_hash": "1d735793a2ea4f1b8c80a88d6581b559", "console": [], "id": "Hbol", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "673c9b60f61ed79f8cf7dd373c09f6a5", "console": [], "id": "MJUe", "outputs": [{"data": {"text/html": "\n\u003Cstyle\u003E\n.nc-card {\n    background: linear-gradient(145deg, #313244, #1e1e2e);\n    border-radius: 18px;\n    padding: 20px;\n    border: 1px solid rgba(255,255,255,0.06);\n    box-shadow: 0 8px 32px rgba(0,0,0,0.28);\n}\n.nc-small {\n    color: #a6adc8;\n    font-size: 0.93em;\n    line-height: 1.6;\n}\n.nc-table {\n    width: 100%;\n    border-collapse: collapse;\n    font-size: 0.95em;\n    overflow: hidden;\n    border-radius: 14px;\n}\n.nc-table th, .nc-table td {\n    padding: 10px 12px;\n    border-bottom: 1px solid #45475a;\n    text-align: center;\n}\n.nc-table th {\n    background: #313244;\n    color: #cdd6f4;\n    font-weight: 700;\n}\n.nc-table td:first-child, .nc-table th:first-child {\n    text-align: left;\n}\n.nc-pill {\n    display: inline-block;\n    padding: 6px 12px;\n    border-radius: 999px;\n    font-weight: 700;\n    font-size: 0.9em;\n}\n@keyframes pulse-glow {\n    0%, 100% { box-shadow: 0 0 20px rgba(137, 180, 250, 0.18); }\n    50% { box-shadow: 0 0 40px rgba(137, 180, 250, 0.32); }\n}\n.nc-hero-glow {\n    animation: pulse-glow 3s ease-in-out infinite;\n}\n\u003C/style\u003E\n"}, "type": "data"}]}, {"code_hash": "c9487e58586243bb6acce8f92aaf38fa", "console": [], "id": "vblA", "outputs": [{"data": {"text/html": "\n\u003Cdiv class=\"nc-hero-glow\" style=\"background: linear-gradient(135deg, #1e1e2e 0%, #2d1b4e 50%, #1e1e2e 100%); border-radius: 24px; padding: 56px 48px; text-align: center; margin-bottom: 32px; position: relative; overflow: hidden;\"\u003E\n    \u003Cdiv style=\"position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 30% 30%, rgba(168, 85, 247, 0.10) 0%, transparent 50%), radial-gradient(circle at 70% 70%, rgba(59, 130, 246, 0.10) 0%, transparent 50%); pointer-events: none;\"\u003E\u003C/div\u003E\n    \u003Cdiv style=\"position: relative; z-index: 1;\"\u003E\n        \u003Cdiv style=\"display:inline-block; margin-bottom: 18px; padding: 8px 14px; border: 1px solid rgba(255,255,255,0.12); border-radius: 999px; color: #cdd6f4; font-size: 0.9em; letter-spacing: 0.04em; text-transform: uppercase; background: rgba(255,255,255,0.04);\"\u003EInteractive research notebook\u003C/div\u003E\n        \u003Ch1 style=\"font-size: 2.7em; color: #cdd6f4; margin-bottom: 16px; font-weight: 800; letter-spacing: -0.02em;\"\u003ECan a Model Learn How a Computer Works?\u003C/h1\u003E\n        \u003Cp style=\"font-size: 1.35em; color: #a6adc8; max-width: 680px; margin: 0 auto 28px auto; line-height: 1.7;\"\u003E\n            Not by reading code. Not by being taught.\u003Cbr\u003E\n            \u003Cstrong style=\"color: #f9e2af;\"\u003EJust by watching the screen change.\u003C/strong\u003E\n        \u003C/p\u003E\n        \u003Cdiv style=\"display: inline-flex; gap: 12px; align-items: center; background: rgba(69, 71, 90, 0.6); backdrop-filter: blur(10px); border-radius: 12px; padding: 14px 24px; border: 1px solid rgba(255,255,255,0.1);\"\u003E\n            \u003Cspan style=\"color: #cdd6f4;\"\u003EInspired by\u003C/span\u003E\n            \u003Ca href=\"https://arxiv.org/abs/2604.06425\" style=\"color: #89b4fa; font-weight: 600; text-decoration: none;\"\u003ENeural Computers\u003C/a\u003E\n            \u003Cspan style=\"color: #6b7280;\"\u003E(2026)\u003C/span\u003E\n        \u003C/div\u003E\n    \u003C/div\u003E\n\u003C/div\u003E\n"}, "type": "data"}]}, {"code_hash": "8756ff656bc6c3109590631c0d51e664", "console": [], "id": "bkHC", "outputs": [{"data": {"text/html": "\u003Cmarimo-callout-output data-html='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;\u0026lt;strong\u0026gt;The big question:\u0026lt;/strong\u0026gt; If you show a model lots of screen recordings, can it learn to predict what happens next?\u0026lt;/span\u0026gt;\u0026#92;n\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;This notebook explores that question with a toy terminal benchmark and a fair comparison between three model families.\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-kind='\u0026quot;info\u0026quot;'\u003E\u003C/marimo-callout-output\u003E"}, "type": "data"}]}, {"code_hash": "fb6057d14b081c445f95e17afe16afbd", "console": [], "id": "lEQa", "outputs": [{"data": {"text/html": "\n\u003Cdiv style=\"display:grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin: 24px 0 32px 0;\"\u003E\n    \u003Cdiv class='nc-card' style='border-left: 3px solid #3b82f6;'\u003E\u003Cdiv style='font-size: 0.82em; letter-spacing:0.06em; text-transform:uppercase; color:#89b4fa; margin-bottom: 8px;'\u003E01\u003C/div\u003E\u003Cdiv style='font-weight: 700; color: #cdd6f4;'\u003ETask\u003C/div\u003E\u003Cdiv class='nc-small'\u003EPredict the next screen from the current one.\u003C/div\u003E\u003C/div\u003E\n    \u003Cdiv class='nc-card' style='border-left: 3px solid #f59e0b;'\u003E\u003Cdiv style='font-size: 0.82em; letter-spacing:0.06em; text-transform:uppercase; color:#f59e0b; margin-bottom: 8px;'\u003E02\u003C/div\u003E\u003Cdiv style='font-weight: 700; color: #cdd6f4;'\u003ESplit\u003C/div\u003E\u003Cdiv class='nc-small'\u003ETyping is easy. Meaning after Enter is hard.\u003C/div\u003E\u003C/div\u003E\n    \u003Cdiv class='nc-card' style='border-left: 3px solid #22c55e;'\u003E\u003Cdiv style='font-size: 0.82em; letter-spacing:0.06em; text-transform:uppercase; color:#22c55e; margin-bottom: 8px;'\u003E03\u003C/div\u003E\u003Cdiv style='font-weight: 700; color: #cdd6f4;'\u003EMetric\u003C/div\u003E\u003Cdiv class='nc-small'\u003EWe score changed cells, not easy unchanged background.\u003C/div\u003E\u003C/div\u003E\n    \u003Cdiv class='nc-card' style='border-left: 3px solid #a855f7;'\u003E\u003Cdiv style='font-size: 0.82em; letter-spacing:0.06em; text-transform:uppercase; color:#a855f7; margin-bottom: 8px;'\u003E04\u003C/div\u003E\u003Cdiv style='font-weight: 700; color: #cdd6f4;'\u003EComparison\u003C/div\u003E\u003Cdiv class='nc-small'\u003EMLP vs Transformer vs GRU on the same settings.\u003C/div\u003E\u003C/div\u003E\n    \u003Cdiv class='nc-card' style='border-left: 3px solid #f97316;'\u003E\u003Cdiv style='font-size: 0.82em; letter-spacing:0.06em; text-transform:uppercase; color:#f97316; margin-bottom: 8px;'\u003E05\u003C/div\u003E\u003Cdiv style='font-weight: 700; color: #cdd6f4;'\u003EFinding\u003C/div\u003E\u003Cdiv class='nc-small'\u003EDifferent architectures win at different parts of the job.\u003C/div\u003E\u003C/div\u003E\n\u003C/div\u003E\n"}, "type": "data"}]}, {"code_hash": "fae3ac1c3df28e34b073933aecb01b79", "console": [], "id": "PKri", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"what-exactly-was-measured\"\u003EWhat exactly was measured?\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EBefore looking at the winner, here is the benchmark in plain English.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "487b9880486b2ffb5ace98835ecd1c7a", "console": [], "id": "Xref", "outputs": [{"data": {"text/html": "\n\u003Cdiv style=\"display:grid; grid-template-columns: 1.2fr 1fr 1fr 1fr; gap: 16px; margin: 20px 0 24px 0;\"\u003E\n    \u003Cdiv class=\"nc-card\" style=\"border-left: 4px solid #89b4fa;\"\u003E\n        \u003Cdiv style=\"font-size:0.82em; letter-spacing:0.06em; text-transform:uppercase; color:#89b4fa; margin-bottom:8px;\"\u003E01\u003C/div\u003E\n        \u003Cdiv style=\"font-weight:700; color:#cdd6f4; margin-bottom:6px;\"\u003EOne sample\u003C/div\u003E\n        \u003Cdiv class=\"nc-small\"\u003EA terminal episode: current screen \u2192 next screen after one action.\u003C/div\u003E\n    \u003C/div\u003E\n    \u003Cdiv class=\"nc-card\" style=\"border-left: 4px solid #22c55e;\"\u003E\n        \u003Cdiv style=\"font-size:0.82em; letter-spacing:0.06em; text-transform:uppercase; color:#22c55e; margin-bottom:8px;\"\u003E02\u003C/div\u003E\n        \u003Cdiv style=\"font-weight:700; color:#cdd6f4; margin-bottom:6px;\"\u003EMain metric\u003C/div\u003E\n        \u003Cdiv class=\"nc-small\"\u003E\u003Cb\u003EChanged-cell accuracy\u003C/b\u003E: only score the cells that actually changed.\u003C/div\u003E\n    \u003C/div\u003E\n    \u003Cdiv class=\"nc-card\" style=\"border-left: 4px solid #a855f7;\"\u003E\n        \u003Cdiv style=\"font-size:0.82em; letter-spacing:0.06em; text-transform:uppercase; color:#a855f7; margin-bottom:8px;\"\u003E03\u003C/div\u003E\n        \u003Cdiv style=\"font-weight:700; color:#cdd6f4; margin-bottom:6px;\"\u003EFour settings\u003C/div\u003E\n        \u003Cdiv class=\"nc-small\"\u003EStandard family, standard command, paraphrase family, paraphrase command.\u003C/div\u003E\n    \u003C/div\u003E\n    \u003Cdiv class=\"nc-card\" style=\"border-left: 4px solid #f97316;\"\u003E\n        \u003Cdiv style=\"font-size:0.82em; letter-spacing:0.06em; text-transform:uppercase; color:#f97316; margin-bottom:8px;\"\u003E04\u003C/div\u003E\n        \u003Cdiv style=\"font-weight:700; color:#cdd6f4; margin-bottom:6px;\"\u003EFair comparison\u003C/div\u003E\n        \u003Cdiv class=\"nc-small\"\u003ESame toy task, same evaluation settings, matched saved result files.\u003C/div\u003E\n    \u003C/div\u003E\n\u003C/div\u003E\n"}, "type": "data"}]}, {"code_hash": "546d2f3778611e6573b97eb1edffaed9", "console": [], "id": "SFPL", "outputs": [{"data": {"text/html": "\u003Cmarimo-callout-output data-html='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;pa l recipe\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;]'\u003E\u003Cdiv data-kind='tab'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EAn episode is a sequence of terminal frames.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EEach step contains:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003Ethe current screen\u003C/li\u003E\n\u003Cli\u003Ethe action that happened (\u003Ccode\u003Etype_char\u003C/code\u003E, \u003Ccode\u003Eenter\u003C/code\u003E, \u003Ccode\u003Eidle\u003C/code\u003E, ...)\u003C/li\u003E\n\u003Cli\u003Ethe next screen\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EThat makes the supervised learning target very concrete: \u003Cstrong\u003Epredict the next frame\u003C/strong\u003E.\u003C/span\u003E\u003C/span\u003E\u003C/div\u003E\u003Cdiv data-kind='tab'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe simplest baseline is local:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003Elook at the current screen\u003C/li\u003E\n\u003Cli\u003Emaybe include a hint about the command\u003C/li\u003E\n\u003Cli\u003Epredict the next screen\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EThen compare that local baseline against sequence models like a Transformer or GRU.\u003C/span\u003E\u003C/span\u003E\u003C/div\u003E\u003Cdiv data-kind='tab'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EDo \u003Cstrong\u003Enot\u003C/strong\u003E rely only on plain character accuracy.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EMost of the screen usually stays the same, so a model can look good while missing the important part.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThe better metric here is:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003Echanged-cell accuracy\u003C/strong\u003E = accuracy restricted to cells that actually changed\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003C/div\u003E\u003Cdiv data-kind='tab'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cdiv class=\"language-python codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"k\"\u003Efor\u003C/span\u003E \u003Cspan class=\"n\"\u003Eepisode\u003C/span\u003E \u003Cspan class=\"ow\"\u003Ein\u003C/span\u003E \u003Cspan class=\"n\"\u003Eepisodes\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\n\u003Cspan class=\"k\"\u003Efor\u003C/span\u003E \u003Cspan class=\"n\"\u003Et\u003C/span\u003E \u003Cspan class=\"ow\"\u003Ein\u003C/span\u003E \u003Cspan class=\"nb\"\u003Erange\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"nb\"\u003Elen\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Eframes\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E \u003Cspan class=\"o\"\u003E-\u003C/span\u003E \u003Cspan class=\"mi\"\u003E1\u003C/span\u003E\u003Cspan class=\"p\"\u003E):\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Ex\u003C/span\u003E \u003Cspan class=\"o\"\u003E=\u003C/span\u003E \u003Cspan class=\"n\"\u003Ecurrent_screen\u003C/span\u003E\u003Cspan class=\"p\"\u003E[\u003C/span\u003E\u003Cspan class=\"n\"\u003Et\u003C/span\u003E\u003Cspan class=\"p\"\u003E],\u003C/span\u003E \u003Cspan class=\"n\"\u003Eoptional_hint\u003C/span\u003E\u003Cspan class=\"p\"\u003E[\u003C/span\u003E\u003Cspan class=\"n\"\u003Et\u003C/span\u003E\u003Cspan class=\"p\"\u003E]\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Ey\u003C/span\u003E \u003Cspan class=\"o\"\u003E=\u003C/span\u003E \u003Cspan class=\"n\"\u003Enext_screen\u003C/span\u003E\u003Cspan class=\"p\"\u003E[\u003C/span\u003E\u003Cspan class=\"n\"\u003Et\u003C/span\u003E \u003Cspan class=\"o\"\u003E+\u003C/span\u003E \u003Cspan class=\"mi\"\u003E1\u003C/span\u003E\u003Cspan class=\"p\"\u003E]\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Eloss\u003C/span\u003E \u003Cspan class=\"o\"\u003E=\u003C/span\u003E \u003Cspan class=\"n\"\u003Escreen_prediction_loss\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Emodel\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Ex\u003C/span\u003E\u003Cspan class=\"p\"\u003E),\u003C/span\u003E \u003Cspan class=\"n\"\u003Ey\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003EThen evaluate on changed-cell accuracy, typing-only steps, and Enter-only steps.\u003C/span\u003E\u003C/span\u003E\u003C/div\u003E\u003C/marimo-tabs\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "dc71141c701d9d9cabeeb7859f2b5694", "console": [], "id": "ulZA", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "49aededead082454a163fc3863e4baef", "console": [], "id": "ecfG", "outputs": [{"data": {"text/html": "\u003Cmarimo-callout-output data-html='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;\u0026lt;strong\u0026gt;Loaded benchmark files\u0026lt;/strong\u0026gt; from \u0026lt;code\u0026gt;/mnt/d/alpha-proj/experiments/toy_nc_cli/results\u0026lt;/code\u0026gt;. The charts below use saved experiment results, not hand-entered demo values.\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-kind='\u0026quot;success\u0026quot;'\u003E\u003C/marimo-callout-output\u003E"}, "type": "data"}]}, {"code_hash": "7c71f333ce906a84cda6acacdcf8e3a9", "console": [], "id": "Pvdt", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"the-architecture-showdown\"\u003EThe architecture showdown\u003C/ iv\u003E\n                \u003Cdiv class=\"nc-small\"\u003ETransformer beats MLP on Enter in \u003Cb\u003E3/4\u003C/b\u003E settings.\u003C/div\u003E\n            \u003C/div\u003E\n            \u003Cdiv class=\"nc-card\" style=\"border-left:4px solid #ef4444; text-align:center;\"\u003E\n                \u003Cdiv style=\"font-size:0.95em; color:#a6adc8; margin-bottom:6px;\"\u003EMean overall changed-cell accuracy\u003C/div\u003E\n                \u003Cdiv style=\"font-size:2.2em; font-weight:800; color:#ef4444;\"\u003E19.9%\u003C/div\u003E\n                \u003Cdiv class=\"nc-small\"\u003EGRU was a negative result on this benchmark.\u003C/div\u003E\n            \u003C/div\u003E\n        \u003C/div\u003E\n        \u003Cdiv style=\"text-align:center; padding-top:16px; border-top:1px solid #45475a; color:#cdd6f4; line-height:1.7;\"\u003E\n            \u003Cb\u003EThe honest story:\u003C/b\u003E the MLP is still the strongest toy baseline overall, but the Transformer is more competitive on the meaning-heavy Enter step.\n            \u003Cbr\u003E\u003Cspan style=\"color:#a6adc8;\"\u003EThat advantage is real, but it is not universal: it is strongest in the standard setting and much smaller under paraphrase.\u003C/span\u003E\n        \u003C/div\u003E\n    \u003C/div\u003E\n    "}, "type": "data"}]}, {"code_hash": "0181fe70eb693139b806dfc937beadfd", "console": [], "id": "nHfw", "outputs": [{"data": {"application/vnd.marimo+mimebundle": "{\"image/png\": \"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABvMAAALkCAYAAAAyD8l2AAAAOnRFWHRTb2Z0d2FyZQBNYXRwbG90bGliIHZlcnNpb24zLjEwLjgsIGh0dHBzOi8vbWF0cGxvdGxpYi5vcmcvwVt1zgAAAAlwSFlzAAAewgAAHsIBbtB1PgAA/QRJREFUeJzs3Xd809X+x/F30jbpHtBFKYW27L1B9hAZiltwXRdX9Lp+evF6r+te53WPK163Xte9uLc4EEFk71U2hTI76d5t8vsDG1uapE1J0xRez8ejD7/NOd/z/TQ0Sc075xxDQkJfqwAAAAAAAAAAAAB4HWNLFwAAAAAAAAAAAADAPsI8AAAAAAAAAAAAwEsR5gEAAAAAAAAAAABeijAPAAAAAAAAAAAA8FKEeQAAAAAAAAAAAICXIswDAAAAAAAAAAAAvBRhHgAAAAAAAAAAAOClCPMAAAAAAAAAAAAAL0WYBwAAAAAAAAAAAHgpwjwAAAAAAAAAAADA : 40px; margin: 24px 0; position: relative; overflow: hidden;\"\u003E\n    \u003Cdiv style=\"position:absolute; inset:0; background: radial-gradient(circle at 20% 80%, rgba(34,197,94,0.10) 0%, transparent 45%), radial-gradient(circle at 80% 20%, rgba(168,85,247,0.10) 0%, transparent 45%);\"\u003E\u003C/div\u003E\n    \u003Cdiv style=\"position:relative; z-index:1; display:grid; grid-template-columns: repeat(3, 1fr); gap: 24px;\"\u003E\n        \u003Cdiv style=\"text-align:center; padding: 18px;\"\u003E\n            \u003Cdiv style=\"font-size:0.82em; letter-spacing:0.06em; text-transform:uppercase; color:#22c55e; margin-bottom:12px;\"\u003E01\u003C/div\u003E\n            \u003Cdiv style=\"color:#22c55e; font-weight:800; font-size:1.2em; margin-bottom:8px;\"\u003EBest overall model\u003C/div\u003E\n            \u003Cdiv style=\"color:#a6adc8; font-size:0.95em;\"\u003EThe MLP is still the strongest baseline on the main benchmark metric.\u003C/div\u003E\n        \u003C/div\u003E\n        \u003Cdiv style=\"text-align:center; padding: 18px;\"\u003E\n            \u003Cdiv style=\"font-size:0.82em; letter-spacing:0.06em; text-transform:uppercase; color:#a855f7; margin-bottom:12px;\"\u003E02\u003C/div\u003E\n            \u003Cdiv style=\"color:#a855f7; font-weight:800; font-size:1.2em; margin-bottom:8px;\"\u003EMost interesting contrast\u003C/div\u003E\n            \u003Cdiv style=\"color:#a6adc8; font-size:0.95em;\"\u003EThe Transformer is relatively stronger on meaning-heavy Enter steps.\u003C/div\u003E\n        \u003C/div\u003E\n        \u003Cdiv style=\"text-align:center; padding: 18px;\"\u003E\n            \u003Cdiv style=\"font-size:0.82em; letter-spacing:0.06em; text-transform:uppercase; color:#ef4444; margin-bottom:12px;\"\u003E03\u003C/div\u003E\n            \u003Cdiv style=\"color:#ef4444; font-weight:800; font-size:1.2em; margin-bottom:8px;\"\u003EImportant limit\u003C/div\u003E\n            \u003Cdiv style=\"color:#a6adc8; font-size:0.95em;\"\u003EThat Transformer gain shrinks sharply under paraphrase, so the toy task still does not show deep semantic generalization.\u003C/div\u003E\n        \u003C/div\u003E\n    \u003C/div\u003E\n\u003C/div\u003E\n"}, "type": "data"}]}, {"code_hash": "d7eab6bb291c3ca82f9bad94f3b8dc2b", "console": [], "id": "kqZH", "outputs": [{"data": {"text/html": "\u003Cmarimo-accordion data-labels='[\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;What this says about model design\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;,\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;What this says about the Neural Computers idea\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;,\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;What to try next\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;]' data-multiple='true'\u003E\u003Cdiv\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EMLP\u003C/strong\u003E is a strong baseline when the task is mostly local and mechanical.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ETransformer\u003C/strong\u003E becomes interesting when the task depends more on global context or command semantics.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EGRU\u003C/strong\u003E did not help here, so \u201cadd recurrence\u201d is not enough by itself.\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E\u003C/div\u003E\u003Cdiv\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe full Neural Computers paper works at a much larger scale: real computer recordings, video generation models, and much more data.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThis toy notebook does \u003Cstrong\u003Enot\u003C/strong\u003E replicate that paper. Instead, it builds intuition for a smaller question: what can a model learn from screen transitions alone, and where does that break?\u003C/span\u003E\u003C/span\u003E\u003C/div\u003E\u003Cdiv\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Col\u003E\n\u003Cli\u003EUse a stronger semantic task than fixed toy commands.\u003C/li\u003E\n\u003Cli\u003EAdd true held-out semantic generalization, not just phrasing variants.\u003C/li\u003E\n\u003Cli\u003ETest a hybrid story: an MLP-style local mechanism plus a Transformer-style global context path.\u003C/li\u003E\n\u003C/ol\u003E\u003C/span\u003E\u003C/div\u003E\u003C/marimo-accordion\u003E"}, "type": "data"}]}, {"code_hash": "4b4cbc6a3218e76e4c4f2c5a74a05be5", "console": [], "id": "wAgl", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Chr /\u003E\n\u003Cdiv style=\"text-align:center; color:#6b7280; padding: 32px;\"\u003E\n\u003Cp style=\"margin-bottom: 10px;\"\u003EBuilt with \u003Ca href=\"https://marimo.io\" style=\"color:#89b4fa;\"\u003Emarimo\u003C/a\u003E\u003C/span\u003E\n\u003Cp style=\"margin-bottom: 10px;\"\u003EInspired by \u003Ca href=\"https://arxiv.org/abs/2604.06425\" style=\"color:#89b4fa;\"\u003ENeural Computers\u003C/a\u003E (Zhuge et al., 2026)\u003C/span\u003E\n\u003Cp style=\"font-size:0.9em; color:#45475a;\"\u003EThis competition notebook uses saved local experiment artifacts for reproducible presentation.\u003C/span\u003E\n\u003C/div\u003E\u003C/span\u003E"}, "type": "data"}]}], "metadata": {"marimo_version": "0.23.1", "script_metadata_hash": null}, "version": "1"},
