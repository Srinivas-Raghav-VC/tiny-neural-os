      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

            "session": {"cells": [{"code_hash": "1d0db38904205bec4d6f6f6a1f6cec3e", "console": [], "id": "Hbol", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "109021255a3648d4bf506d8264cf499d", "console": [], "id": "MJUe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1 id=\"tiny-neural-os\"\u003ETiny Neural OS\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ECan a model learn how a computer works from screen transitions alone?\u003C/strong\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThis notebook implements the core idea from \u003Ca href=\"https://arxiv.org/abs/2604.06425\" rel=\"noopener noreferrer\" target=\"_blank\"\u003ENeural Computers (arXiv:2604.06425)\u003C/a\u003E:\npredict the next terminal screen from the current one, then measure whether the model\ncaptures mechanical typing versus semantic command execution.\u003C/span\u003E\n\u003Chr /\u003E\n\u003Ch2 id=\"what-we-build\"\u003EWhat we build\u003C/h2\u003E\n\u003Col\u003E\n\u003Cli\u003E\u003Cstrong\u003EToy terminal simulator\u003C/strong\u003E \u2014 generates command episodes with typed input and output\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EMLP baseline\u003C/strong\u003E \u2014 per-cell classifier using local patch features\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EEvaluation protocol\u003C/strong\u003E \u2014 separates typing accuracy from Enter accuracy\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EInteractive visualizations\u003C/strong\u003E \u2014 explore the benchmark with Altair charts\u003C/li\u003E\n\u003C/ol\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "7c271d9b6ac007f02792927462faca02", "console": [], "id": "vblA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Chr /\u003E\n\u003Ch2 id=\"1-the-toy-terminal\"\u003E1. The Toy Terminal\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EWe simulate a simple terminal where a user types commands and sees output.\nEach episode is a sequence of frames (screen states) and actions (keystrokes).\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "797f7db1fea976d61583d9dc2e2c206d", "console": [], "id": "bkHC", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "f59aa26196ee27f8bc4e32c0ee9c0692", "console": [], "id": "lEQa", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "78178565a36945a00d3c40f388d07673", "console": [], "id": "PKri", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "74e85e63927100d4c5f5a36d43fff44c", "console": [], "id": "Xref", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"interactive-terminal-playground\"\u003EInteractive Terminal Playground\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EUse the controls below to explore how the terminal evolves step by step.\nNotice how \u003Cstrong\u003Etyping\u003C/strong\u003E changes only a small local patch, while \u003Cstrong\u003EEnter\u003C/strong\u003E triggers\na larger, meaning-dependent screen update.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "b351d0af599d437947aeb413adeef94f", "console": [], "id": "SFPL", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "edeaa6fe0239021283bf67ac495bceef", "console": [], "id": "BYtC", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "03026daf04ac5742c94e14f173567cfb", "console": [], "id": "RGSE", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "b9fb99e0022e490037c53f97c6d09fc0", "console": [], "id": "Kclp", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: flex-end;flex-wrap: nowrap;gap: 1rem'\u003E\u003Cdiv style='flex:  training scripts and full model implementations are in \u003Ccode\u003Eexperiments/toy_nc_cli/\u003C/code\u003E.\nThe benchmark CSV used for the visualizations above is at \u003Ccode\u003Eexperiments/toy_nc_cli/results/baseline_comparison.csv\u003C/code\u003E.\u003C/span\u003E\n\u003Cdiv class=\"language-bash codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"c1\"\u003E# Run the smoke test locally\u003C/span\u003E\npython\u003Cspan class=\"w\"\u003E \u003C/span\u003Eexperiments/toy_nc_cli/scripts/smoke_test.py\n\n\u003Cspan class=\"c1\"\u003E# Train Transformer on GPU\u003C/span\u003E\npython\u003Cspan class=\"w\"\u003E \u003C/span\u003Eexperiments/toy_nc_cli/scripts/train_transformer_baseline.py\n\n\u003Cspan class=\"c1\"\u003E# Train GRU on GPU\u003C/span\u003E\npython\u003Cspan class=\"w\"\u003E \u003C/span\u003Eexperiments/toy_nc_cli/scripts/train_gru_baseline.py\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Chr /\u003E\n\u003Cspan class=\"paragraph\"\u003EBuilt with \u003Ca href=\"https://marimo.io/\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Emarimo\u003C/a\u003E \u00b7 Inspired by \u003Ca href=\"https://arxiv.org/abs/2604.06425\" rel=\"noopener noreferrer\" target=\"_blank\"\u003ENeural Computers (arXiv:2604.06425)\u003C/a\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}], "metadata": {"marimo_version": "0.23.1", "script_metadata_hash": null}, "version": "1"},
